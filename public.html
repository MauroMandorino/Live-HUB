<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
@font-face { font-family:'Virage'; font-weight:600; font-style:normal; src:url('assets/fonts/Virage-Semibold.otf') format('opentype'); font-display:swap; }
@font-face { font-family:'Virage'; font-weight:700; font-style:normal; src:url('assets/fonts/Virage-Bold.otf') format('opentype'); font-display:swap; }
:root{
  --font-sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Virage','Geist',system-ui,sans-serif;
  --bg:#F6F8FA;--surface:#fff;--surface2:#EAEEF1;
  --border:#E1E6F0;--border2:#a1a1a1;
  --text:#171717;--text2:#4d4d4d;--text3:#888888;
  --radius:0 12px 0 12px;--radius-sm:6px;
  --accent:#141428;--accent-press:#0c0c18;--accent-contrast:#fff;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171717;--surface:#212121;--surface2:#2a2a2a;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
  --text:#f2f2f2;--text2:#b4b4b4;--text3:#888888;
  --accent:#7f8fdc;--accent-press:#a3b0e6;--accent-contrast:#141428;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;gap:9px;color:var(--text)}
.logo img{height:26px;width:auto}
.sub{font-size:14px;color:var(--text2);margin-top:4px}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.top-strip{display:flex;justify-content:flex-end;margin-bottom:1rem}
.hero{position:relative;overflow:hidden;background:#141428;border-radius:var(--radius);padding:1.75rem;margin-bottom:1.75rem}
.hero .wm{position:absolute;right:-6%;bottom:-30%;width:55%;opacity:.10;filter:invert(1);pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero .logo{color:#fff}
.hero .sub{color:rgba(255,255,255,.78)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.module-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;text-decoration:none;color:var(--text);display:block;transition:transform .1s}
.module-card:hover{transform:translateY(-2px)}
.module-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;background:var(--surface2);color:var(--accent)}
.module-nm{font-size:15px;font-weight:600;margin-bottom:3px}
.module-desc{font-size:12px;color:var(--text2);line-height:1.5}
</style>
</head>
<body>
<div class="container">

<div class="top-strip">
  <div class="lang-switch" id="lang-switch"></div>
</div>

<div class="hero">
  <img class="wm" src="assets/logos/psg-watermark.svg" alt="" aria-hidden="true">
  <div class="hero-content">
    <div class="logo"><img src="assets/logos/psg-crest-white.svg" alt=""> <span data-t="pageTitle">Research Hub</span></div>
    <div class="sub" data-t="pageSub">Public information for the team. Updates automatically.</div>
  </div>
</div>

<div class="module-grid" id="module-grid"></div>

</div>

<script>
const I18N = {
  en: { pageTitle:'Research Hub', pageSub:'Public information for the team. Updates automatically.',
    ideaNm:'Submit a research idea', ideaDesc:'Share a research proposal for review.',
    calNm:'Research calendar', calDesc:'Meetings, congresses, and abstract deadlines.',
    papersNm:'Latest papers', papersDesc:'PubMed feed, rate articles, request PDFs.',
    tipNm:'Tip of the week', tipDesc:'Short posts with insights, charts, and images.' },
  it: { pageTitle:'Research Hub', pageSub:'Informazioni pubbliche per il team. Si aggiorna automaticamente.',
    ideaNm:'Sottometti un\u2019idea di ricerca', ideaDesc:'Condividi una proposta di ricerca per la revisione.',
    calNm:'Calendario ricerca', calDesc:'Meeting, congressi e scadenze abstract.',
    papersNm:'Ultimi articoli', papersDesc:'Feed PubMed, vota gli articoli, richiedi i PDF.',
    tipNm:'Tip of the week', tipDesc:'Post brevi con insight, grafici e immagini.' },
  fr: { pageTitle:'Research Hub', pageSub:'Informations publiques pour l\u2019\u00e9quipe. Mise \u00e0 jour automatique.',
    ideaNm:'Soumettre une id\u00e9e de recherche', ideaDesc:'Partagez une proposition de recherche pour \u00e9valuation.',
    calNm:'Calendrier recherche', calDesc:'R\u00e9unions, congr\u00e8s et \u00e9ch\u00e9ances d\u2019abstract.',
    papersNm:'Derniers articles', papersDesc:'Flux PubMed, notez les articles, demandez des PDF.',
    tipNm:'Tip of the week', tipDesc:'Posts courts avec insights, graphiques et images.' },
  es: { pageTitle:'Research Hub', pageSub:'Informaci\u00f3n p\u00fablica para el equipo. Se actualiza autom\u00e1ticamente.',
    ideaNm:'Enviar una idea de investigaci\u00f3n', ideaDesc:'Comparte una propuesta de investigaci\u00f3n para su revisi\u00f3n.',
    calNm:'Calendario de investigaci\u00f3n', calDesc:'Reuniones, congresos y plazos de abstract.',
    papersNm:'\u00daltimos art\u00edculos', papersDesc:'Feed de PubMed, punt\u00faa art\u00edculos, solicita PDF.',
    tipNm:'Tip of the week', tipDesc:'Publicaciones breves con ideas, gr\u00e1ficos e im\u00e1genes.' }
};
let lang = 'en';
try { lang = localStorage.getItem('hubLang') || 'en'; } catch(e) {}
function t(key){ return (I18N[lang] && I18N[lang][key]) || I18N.en[key]; }

const MODULES = [
  { key:'idea', href:'public-idea.html', icon:'ti-bulb' },
  { key:'cal', href:'public-calendar.html', icon:'ti-calendar-stats' },
  { key:'papers', href:'public-papers.html', icon:'ti-news' },
  { key:'tip', href:'public-tip.html', icon:'ti-bulb' }
];

function renderModules(){
  document.getElementById('module-grid').innerHTML = MODULES.map(function(m){
    return '<a class="module-card" href="'+m.href+'">'+
      '<div class="module-icon"><i class="ti '+m.icon+'"></i></div>'+
      '<div class="module-nm">'+t(m.key+'Nm')+'</div>'+
      '<div class="module-desc">'+t(m.key+'Desc')+'</div>'+
      '</a>';
  }).join('');
}
function applyStaticText(){ document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.dataset.t); }); }
function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['en','fr','it','es'].map(function(l){
    return '<button class="lang-btn '+(l===lang?'active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>';
  }).join('');
}
function setLang(l){ lang = l; try { localStorage.setItem('hubLang', l); } catch(e) {} renderLangSwitch(); applyStaticText(); renderModules(); }
window.setLang = setLang;

renderLangSwitch();
applyStaticText();
renderModules();
</script>
</body>
</html>
