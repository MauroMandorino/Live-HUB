<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research \u2014 Overview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f1efe8;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --radius:12px;--radius-sm:8px;
  --blue-bg:#E6F1FB;--blue-tx:#0C447C;
  --green-bg:#EAF3DE;--green-tx:#27500A;
  --amber-bg:#FAEEDA;--amber-tx:#633806;
  --purple-bg:#EEEDFE;--purple-tx:#3C3489;
  --teal-bg:#E1F5EE;--teal-tx:#085041;
  --coral-bg:#FAECE7;--coral-tx:#712B13;
  --red:#E24B4A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --text:#f0ece4;--text2:#b4b2a9;--text3:#888780;
  --blue-bg:#0C447C;--blue-tx:#B5D4F4;
  --green-bg:#27500A;--green-tx:#C0DD97;
  --amber-bg:#633806;--amber-tx:#FAC775;
  --purple-bg:#3C3489;--purple-tx:#CECBF6;
  --teal-bg:#085041;--teal-tx:#9FE1CB;
  --coral-bg:#712B13;--coral-tx:#F5C4B3;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo i{color:var(--blue-tx)}
.sub{font-size:14px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:12px}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lang-btn.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.top-strip{display:flex;justify-content:flex-end;margin-bottom:1rem}
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px}
.alert-err{background:rgba(226,75,74,.1);color:var(--red);border:0.5px solid rgba(226,75,74,.3)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--blue-tx);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.ext-link-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--teal-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1.5rem;flex-wrap:wrap}
.ext-link-card .txt{font-size:13px;color:var(--teal-tx)}
.ext-link-card .txt strong{display:block;font-size:15px;margin-bottom:2px}
.ext-link-card .btn{border-color:var(--teal-tx);color:var(--teal-tx);background:var(--surface)}
.ext-link-card .btn:hover{background:var(--teal-bg)}

.section-title{font-size:15px;font-weight:600;margin:1.75rem 0 .9rem;display:flex;align-items:center;gap:8px}

.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.cal-filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2)}
.tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.cal-head{background:var(--surface2);text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);padding:6px 2px}
.cal-cell{background:var(--surface);min-height:74px;padding:4px;font-size:11px}
.cal-empty{background:var(--bg)}
.cal-today .cal-daynum{background:var(--text);color:var(--surface);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.cal-daynum{font-size:11px;color:var(--text2);margin-bottom:3px}
.cal-chip{border-radius:5px;padding:1px 5px;margin-bottom:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-blue{background:var(--blue-bg);color:var(--blue-tx)}
.cal-purple{background:var(--purple-bg);color:var(--purple-tx)}
.cal-coral{background:var(--coral-bg);color:var(--coral-tx)}
.cal-amber{background:var(--amber-bg);color:var(--amber-tx)}
.cal-more{font-size:10px;color:var(--text3)}
@media(max-width:600px){.cal-cell{min-height:56px;font-size:10px}.cal-chip{font-size:9px}}

.idea-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:.7rem;padding:1rem 1.25rem}
.idea-title{font-size:14px;font-weight:600}
.idea-meta{font-size:12px;color:var(--text3);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}

.article-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.9rem}
.article-title{font-size:14px;font-weight:600;line-height:1.4}
.article-title a{color:var(--text);text-decoration:none}
.article-title a:hover{text-decoration:underline}
.article-meta{font-size:11px;color:var(--text3);margin-top:4px}
.article-snip{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5}
.article-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:.9rem;flex-wrap:wrap}
.stars{display:flex;gap:2px}
.star{font-size:18px;cursor:pointer;color:var(--border2)}
.star.filled{color:#e8a33d}
.rating-info{font-size:11px;color:var(--text3);margin-left:6px}
.pdf-form{margin-top:.9rem;padding:.9rem;background:var(--surface2);border-radius:var(--radius-sm)}
.pdf-form input,.pdf-form textarea{margin-top:4px;margin-bottom:.6rem}
input,textarea{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none}
</style>
</head>
<body>
<div class="container">

<div class="top-strip">
  <div class="lang-switch" id="lang-switch"></div>
</div>

<div style="margin-bottom:.5rem">
  <div class="logo"><i class="ti ti-microscope" style="font-size:22px"></i> <span data-t="pageTitle">Research \u2014 Overview</span></div>
  <div class="sub" data-t="pageSub">Public information for stakeholders. This page updates automatically.</div>
</div>

<div class="ext-link-card">
  <div class="txt"><strong data-t="extIdeaTitle">Submit a new research idea</strong><span data-t="extIdeaSub">Share a proposal for review.</span></div>
  <a class="btn" href="submit-idea.html" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> <span data-t="extIdeaBtn">Open form</span></a>
</div>

<div class="section-title"><i class="ti ti-calendar-stats"></i> <span data-t="calTitle">Research calendar</span></div>
<div id="cal-container"></div>

<div class="section-title"><i class="ti ti-news"></i> <span data-t="rssTitle">Latest papers</span></div>
<div id="rss-container"></div>

</div>

<script>
const I18N = {
  en: { pageTitle:'Research \u2014 Overview', pageSub:'Public information for stakeholders. This page updates automatically.',
    extIdeaTitle:'Submit a new research idea', extIdeaSub:'Share a proposal for review.', extIdeaBtn:'Open form',
    calTitle:'Research calendar', connecting:'Connecting to the database...', offline:'Could not reach the database. Check your connection and reload.',
    noEvents:'No upcoming events', allTypes:'All', today:'Today',
    meeting:'Research meeting', congress:'Congress', deadline:'Abstract / deadline', other:'Other', locale:'en-GB',
    rssTitle:'Latest papers', rssLoading:'Loading the latest papers...', rssEmpty:'No articles available right now.', rssFailed:'Could not load the article feed right now.',
    requestPdf:'Request PDF', yourEmail:'Your email', note:'Note (optional)', notePh:'Any detail that helps us find the right version...',
    send:'Send request', cancel:'Cancel', requestSent:'Request sent \u2014 you\'ll be contacted once the PDF is available.', ratings:'ratings' },
  it: { pageTitle:'Research \u2014 Panoramica', pageSub:'Informazioni pubbliche per gli stakeholder. Questa pagina si aggiorna automaticamente.',
    extIdeaTitle:'Sottometti una nuova idea di ricerca', extIdeaSub:'Condividi una proposta per la revisione.', extIdeaBtn:'Apri il form',
    calTitle:'Calendario ricerca', connecting:'Connessione al database...', offline:'Impossibile raggiungere il database. Controlla la connessione e ricarica.',
    noEvents:'Nessun evento in programma', allTypes:'Tutti', today:'Oggi',
    meeting:'Research meeting', congress:'Congresso', deadline:'Abstract / scadenza', other:'Altro', locale:'it-IT',
    rssTitle:'Ultimi articoli', rssLoading:'Caricamento degli ultimi articoli...', rssEmpty:'Nessun articolo disponibile al momento.', rssFailed:'Impossibile caricare il feed articoli in questo momento.',
    requestPdf:'Richiedi PDF', yourEmail:'La tua email', note:'Nota (opzionale)', notePh:'Qualsiasi dettaglio utile per trovare la versione giusta...',
    send:'Invia richiesta', cancel:'Annulla', requestSent:'Richiesta inviata \u2014 sarai contattato non appena il PDF sar\u00e0 disponibile.', ratings:'voti' },
  fr: { pageTitle:'Research \u2014 Aper\u00e7u', pageSub:'Informations publiques pour les parties prenantes. Cette page se met \u00e0 jour automatiquement.',
    extIdeaTitle:'Soumettre une nouvelle id\u00e9e de recherche', extIdeaSub:'Partagez une proposition pour \u00e9valuation.', extIdeaBtn:'Ouvrir le formulaire',
    calTitle:'Calendrier recherche', connecting:'Connexion \u00e0 la base de donn\u00e9es...', offline:"Impossible d'acc\u00e9der \u00e0 la base de donn\u00e9es. V\u00e9rifiez votre connexion et rechargez.",
    noEvents:'Aucun \u00e9v\u00e9nement \u00e0 venir', allTypes:'Tous', today:'Aujourd\u2019hui',
    meeting:'R\u00e9union de recherche', congress:'Congr\u00e8s', deadline:'Abstract / \u00e9ch\u00e9ance', other:'Autre', locale:'fr-FR',
    rssTitle:'Derniers articles', rssLoading:'Chargement des derniers articles...', rssEmpty:'Aucun article disponible pour le moment.', rssFailed:'Impossible de charger le flux d\u2019articles pour le moment.',
    requestPdf:'Demander le PDF', yourEmail:'Votre email', note:'Note (facultatif)', notePh:'Tout d\u00e9tail utile pour trouver la bonne version...',
    send:'Envoyer la demande', cancel:'Annuler', requestSent:'Demande envoy\u00e9e \u2014 vous serez contact\u00e9 d\u00e8s que le PDF sera disponible.', ratings:'votes' },
  es: { pageTitle:'Research \u2014 Resumen', pageSub:'Informaci\u00f3n p\u00fablica para los interesados. Esta p\u00e1gina se actualiza autom\u00e1ticamente.',
    extIdeaTitle:'Enviar una nueva idea de investigaci\u00f3n', extIdeaSub:'Comparte una propuesta para su revisi\u00f3n.', extIdeaBtn:'Abrir formulario',
    calTitle:'Calendario de investigaci\u00f3n', connecting:'Conectando a la base de datos...', offline:'No se pudo conectar a la base de datos. Comprueba tu conexi\u00f3n y recarga.',
    noEvents:'No hay eventos pr\u00f3ximos', allTypes:'Todos', today:'Hoy',
    meeting:'Reuni\u00f3n de investigaci\u00f3n', congress:'Congreso', deadline:'Abstract / plazo', other:'Otro', locale:'es-ES',
    rssTitle:'\u00daltimos art\u00edculos', rssLoading:'Cargando los \u00faltimos art\u00edculos...', rssEmpty:'No hay art\u00edculos disponibles en este momento.', rssFailed:'No se pudo cargar el feed de art\u00edculos en este momento.',
    requestPdf:'Solicitar PDF', yourEmail:'Tu email', note:'Nota (opcional)', notePh:'Cualquier detalle \u00fatil para encontrar la versi\u00f3n correcta...',
    send:'Enviar solicitud', cancel:'Cancelar', requestSent:'Solicitud enviada \u2014 te contactaremos en cuanto el PDF est\u00e9 disponible.', ratings:'valoraciones' }
};
let lang = 'en';
try { lang = localStorage.getItem('hubLang') || 'en'; } catch(e) {}
function t(key){ return (I18N[lang] && I18N[lang][key]) || I18N.en[key]; }

let calDate = new Date(); calDate.setDate(1);
let calFilter = 'all';
let events = [], eventsReady = false, eventsFailed = false;
const EVENT_TYPES = ['meeting','congress','deadline','other'];
const EVENT_COLORS = { meeting:'blue', congress:'purple', deadline:'coral', other:'amber' };

function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function isoDate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function monthLabel(d){ const s = d.toLocaleDateString(I18N[lang].locale, {month:'long', year:'numeric'}); return s.charAt(0).toUpperCase()+s.slice(1); }
function dayHeaders(){
  const base = new Date(2024,0,1);
  const out = [];
  for (let i=0;i<7;i++){ const d = new Date(base); d.setDate(base.getDate()+i); out.push(d.toLocaleDateString(I18N[lang].locale,{weekday:'short'})); }
  return out;
}
function filteredEvents(){ return calFilter === 'all' ? events : events.filter(function(e){ return e.type === calFilter; }); }

function changeMonth(delta){ calDate = new Date(calDate.getFullYear(), calDate.getMonth()+delta, 1); renderCalendar(); }
function goToday(){ calDate = new Date(); calDate.setDate(1); renderCalendar(); }
function setCalFilter(f){ calFilter = f; renderCalendar(); }

function calendarGridMarkup(){
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const first = new Date(y, m, 1);
  const offset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
  const todayStr = isoDate(new Date());
  const evs = filteredEvents();

  let cells = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - offset + 1;
    if (dayNum < 1 || dayNum > daysInMonth) { cells += '<div class="cal-cell cal-empty"></div>'; continue; }
    const d = new Date(y, m, dayNum);
    const dStr = isoDate(d);
    const dayEvents = evs.filter(function(e){ return e.date === dStr; });
    const isToday = dStr === todayStr;
    cells += '<div class="cal-cell '+(isToday?'cal-today':'')+'">'+
      '<div class="cal-daynum">'+dayNum+'</div>'+
      dayEvents.slice(0,3).map(function(e){
        const c = EVENT_COLORS[e.type] || 'blue';
        return '<div class="cal-chip cal-'+c+'" title="'+esc(e.title)+'">'+esc(e.title)+'</div>';
      }).join('') +
      (dayEvents.length > 3 ? '<div class="cal-more">+'+(dayEvents.length-3)+'</div>' : '') +
      '</div>';
  }

  const headers = dayHeaders().map(function(h){ return '<div class="cal-head">'+h+'</div>'; }).join('');

  return '<div class="cal-nav">'+
    '<button class="btn btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>'+
    '<div style="font-weight:600;font-size:15px">'+monthLabel(calDate)+'</div>'+
    '<button class="btn btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>'+
    '<button class="btn btn-sm" onclick="goToday()">'+t('today')+'</button>'+
    '</div>'+
    '<div class="cal-filters">'+
    '<div class="tab '+(calFilter==='all'?'active':'')+'" onclick="setCalFilter(\'all\')">'+t('allTypes')+'</div>'+
    EVENT_TYPES.map(function(ty){ return '<div class="tab '+(calFilter===ty?'active':'')+'" onclick="setCalFilter(\''+ty+'\')">'+t(ty)+'</div>'; }).join('')+
    '</div>'+
    '<div class="cal-grid">'+headers+cells+'</div>';
}

function upcomingListMarkup(){
  const todayStr = isoDate(new Date());
  const upcoming = filteredEvents().filter(function(e){ return e.date >= todayStr; }).sort(function(a,b){ return (a.date+a.time) < (b.date+b.time) ? -1 : 1; }).slice(0,8);
  if (!upcoming.length) return '<div class="empty"><i class="ti ti-calendar-off" style="font-size:24px"></i><div style="margin-top:8px">'+t('noEvents')+'</div></div>';
  return upcoming.map(function(e){
    const dLabel = new Date(e.date+'T00:00:00').toLocaleDateString(I18N[lang].locale, {day:'numeric',month:'short',year:'numeric'});
    return '<div class="idea-card"><div class="idea-title">'+esc(e.title)+'</div>'+
      '<div class="idea-meta">'+dLabel+(e.time?' \u00b7 '+e.time:'')+' \u00b7 '+t(e.type)+'</div></div>';
  }).join('');
}

function renderCalendar(){
  const el = document.getElementById('cal-container');
  if (eventsFailed) { el.innerHTML = '<div class="alert alert-err">'+t('offline')+'</div>'; return; }
  if (!eventsReady) { el.innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('connecting')+'</div></div>'; return; }
  el.innerHTML = calendarGridMarkup() + '<div style="margin-top:1.5rem">' + upcomingListMarkup() + '</div>';
}

/* ---- Papers RSS ---- */
// TODO: replace with your real PubMed / Inoreader RSS feed URLs (one per saved search/query)
const RSS_FEEDS = [
  "https://pubmed.ncbi.nlm.nih.gov/rss/search/1A2b3C4d5E6f7G8h9I0jKlmNoPQRstuVWxyz/?limit=15&utm_campaign=pubmed-2"
];

let rssArticles = [], rssLoading = true, rssFailed = false;
let ratingsMap = {}; // articleId -> {sum, count}
let myRatings = {};
try { myRatings = JSON.parse(localStorage.getItem('myArticleRatings') || '{}'); } catch(e) { myRatings = {}; }
let requestFormOpenId = null;
let requestDraft = { email:'', notes:'' };
let requestSentIds = {};

function simpleHash(str){
  let h = 0;
  for (let i=0;i<str.length;i++){ h = (h<<5) - h + str.charCodeAt(i); h |= 0; }
  return 'a' + Math.abs(h).toString(36);
}
function articleId(item){ return simpleHash(item.link || item.guid || item.title || ''); }
function stripHtml(s){ const d = document.createElement('div'); d.innerHTML = s || ''; return d.textContent || ''; }

async function loadRssArticles(){
  rssLoading = true; rssFailed = false; renderRss();
  try {
    const results = await Promise.all(RSS_FEEDS.map(function(url){
      return fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url))
        .then(function(r){ return r.json(); })
        .catch(function(){ return null; });
    }));
    let items = [];
    results.forEach(function(res){ if (res && res.status === 'ok' && res.items) items = items.concat(res.items); });
    items.sort(function(a,b){ return new Date(b.pubDate) - new Date(a.pubDate); });
    rssArticles = items.slice(0, 25);
    rssLoading = false;
  } catch (e) {
    rssFailed = true; rssLoading = false;
  }
  renderRss();
  if (window.watchArticleRatings) rssArticles.forEach(function(item){ window.watchArticleRatings(articleId(item)); });
}

function starsMarkup(id, avg, count){
  const rounded = Math.round(avg);
  let out = '<div class="stars">';
  for (let i=1;i<=5;i++){
    out += '<span class="star '+(i<=rounded?'filled':'')+'" onclick="rateArticle(\''+id+'\','+i+')">\u2605</span>';
  }
  out += '</div><span class="rating-info">'+(count ? avg.toFixed(1)+' ('+count+' '+t('ratings')+')' : '')+'</span>';
  return out;
}

function rateArticle(id, value){
  const item = rssArticles.find(function(a){ return articleId(a) === id; });
  if (!item || !window.submitRating) return;
  const prev = myRatings[id] || 0;
  window.submitRating(id, item, value, prev);
  myRatings[id] = value;
  try { localStorage.setItem('myArticleRatings', JSON.stringify(myRatings)); } catch(e) {}
}

function openRequestForm(id){ requestFormOpenId = id; requestDraft = { email:'', notes:'' }; renderRss(); }
function closeRequestForm(){ requestFormOpenId = null; renderRss(); }
function updateRequestDraft(field, val){ requestDraft[field] = val; }
function confirmSendRequest(id){
  const item = rssArticles.find(function(a){ return articleId(a) === id; });
  if (!item || !requestDraft.email || !window.submitPdfRequest) return;
  window.submitPdfRequest(item, requestDraft.email, requestDraft.notes);
  requestSentIds[id] = true;
  requestFormOpenId = null;
  renderRss();
}

function articleMarkup(item){
  const id = articleId(item);
  const r = ratingsMap[id] || { sum:0, count:0 };
  const avg = r.count ? r.sum / r.count : 0;
  const dLabel = item.pubDate ? new Date(item.pubDate).toLocaleDateString(I18N[lang].locale, {day:'numeric',month:'short',year:'numeric'}) : '';
  const snippet = stripHtml(item.description || '').slice(0, 220);
  return '<div class="article-card">'+
    '<div class="article-title"><a href="'+esc(item.link)+'" target="_blank" rel="noopener">'+esc(item.title)+'</a></div>'+
    '<div class="article-meta">'+esc(item.author || 'PubMed')+(dLabel ? ' \u00b7 '+dLabel : '')+'</div>'+
    (snippet ? '<div class="article-snip">'+esc(snippet)+(snippet.length>=220?'...':'')+'</div>' : '')+
    '<div class="article-footer">'+
    starsMarkup(id, avg, r.count)+
    (requestSentIds[id] ?
      '<span class="badge b-accepted"><i class="ti ti-check"></i> '+t('requestSent')+'</span>' :
      '<button class="btn btn-sm" onclick="openRequestForm(\''+id+'\')"><i class="ti ti-file-download"></i> '+t('requestPdf')+'</button>')+
    '</div>'+
    (requestFormOpenId === id ? '<div class="pdf-form">'+
      '<label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3)">'+t('yourEmail')+'</label>'+
      '<input type="email" oninput="updateRequestDraft(\'email\',this.value)" placeholder="you@example.com">'+
      '<label style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3)">'+t('note')+'</label>'+
      '<textarea rows="2" oninput="updateRequestDraft(\'notes\',this.value)" placeholder="'+t('notePh')+'"></textarea>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="confirmSendRequest(\''+id+'\')"><i class="ti ti-send"></i> '+t('send')+'</button>'+
      '<button class="btn btn-sm" onclick="closeRequestForm()">'+t('cancel')+'</button></div>'+
      '</div>' : '')+
    '</div>';
}

function renderRss(){
  const el = document.getElementById('rss-container');
  if (!el) return;
  if (rssFailed) { el.innerHTML = '<div class="alert alert-err">'+t('rssFailed')+'</div>'; return; }
  if (rssLoading) { el.innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('rssLoading')+'</div></div>'; return; }
  if (!rssArticles.length) { el.innerHTML = '<div class="empty"><i class="ti ti-news-off" style="font-size:24px"></i><div style="margin-top:8px">'+t('rssEmpty')+'</div></div>'; return; }
  el.innerHTML = rssArticles.map(articleMarkup).join('');
}

function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['en','fr','it','es'].map(function(l){
    return '<button class="lang-btn '+(l===lang?'active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>';
  }).join('');
}
function applyStaticText(){ document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.dataset.t); }); }
function setLang(l){ lang = l; try { localStorage.setItem('hubLang', l); } catch(e) {} renderLangSwitch(); applyStaticText(); renderCalendar(); }

window.changeMonth = changeMonth;
window.goToday = goToday;
window.setCalFilter = setCalFilter;
window.setLang = setLang;
window.onEventsUpdated = function(data){ events = data; eventsReady = true; renderCalendar(); };
window.onEventsFailed = function(){ eventsFailed = true; renderCalendar(); };
window.rateArticle = rateArticle;
window.openRequestForm = openRequestForm;
window.closeRequestForm = closeRequestForm;
window.updateRequestDraft = updateRequestDraft;
window.confirmSendRequest = confirmSendRequest;
window.onArticleRatingUpdated = function(id, sum, count){ ratingsMap[id] = { sum: sum, count: count }; renderRss(); };

renderLangSwitch();
applyStaticText();
renderCalendar();
loadRssArticles();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, addDoc, runTransaction, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdKgOZILgA_r6axtQKWWLqVaDBUkp6OKE",
  authDomain: "phd-tracker-22d93.firebaseapp.com",
  projectId: "phd-tracker-22d93",
  storageBucket: "phd-tracker-22d93.firebasestorage.app",
  messagingSenderId: "252875836800",
  appId: "1:252875836800:web:dc6575ffab316da3744565"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  if (window.onEventsFailed) window.onEventsFailed();
}

if (db) {
  const q = query(collection(db, 'researchEvents'), orderBy('date', 'asc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onEventsUpdated) window.onEventsUpdated(data);
    },
    function () {
      if (window.onEventsFailed) window.onEventsFailed();
    }
  );
} else {
  if (window.onEventsFailed) window.onEventsFailed();
}

const watchedRatings = {};
window.watchArticleRatings = function (id) {
  if (!db || watchedRatings[id]) return;
  watchedRatings[id] = true;
  onSnapshot(doc(db, 'articleRatings', id), function (snap) {
    const data = snap.exists() ? snap.data() : { sum: 0, count: 0 };
    if (window.onArticleRatingUpdated) window.onArticleRatingUpdated(id, data.sum || 0, data.count || 0);
  }, function () {});
};

window.submitRating = async function (id, item, value, previousValue) {
  if (!db) return;
  const ref = doc(db, 'articleRatings', id);
  try {
    await runTransaction(db, async function (tx) {
      const snap = await tx.get(ref);
      if (!snap.exists()) {
        tx.set(ref, { title: item.title || '', link: item.link || '', sum: value, count: 1 });
      } else {
        const data = snap.data();
        const hadPrevious = previousValue > 0;
        const newSum = (data.sum || 0) - (hadPrevious ? previousValue : 0) + value;
        const newCount = (data.count || 0) + (hadPrevious ? 0 : 1);
        tx.update(ref, { sum: newSum, count: newCount, title: item.title || '', link: item.link || '' });
      }
    });
  } catch (e) {}
};

// TODO: configure EmailJS (same account as submit-idea.html) to notify the owner
// when a PDF request comes in. Create a 3rd template with variables:
// requester_email, article_title, article_link, notes
const EMAILJS_PUBLIC_KEY = "YOUR_EMAILJS_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "YOUR_EMAILJS_SERVICE_ID";
const EMAILJS_TEMPLATE_ID_PDF = "YOUR_EMAILJS_TEMPLATE_ID_PDF_REQUEST";
if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') window.emailjs.init(EMAILJS_PUBLIC_KEY);

window.submitPdfRequest = async function (item, email, notes) {
  if (!db) return;
  await addDoc(collection(db, 'paperRequests'), {
    articleTitle: item.title || '',
    articleLink: item.link || '',
    requesterEmail: email,
    notes: notes || '',
    status: 'pending',
    createdAt: serverTimestamp()
  });
  if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') {
    window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID_PDF, {
      requester_email: email,
      article_title: item.title || '',
      article_link: item.link || '',
      notes: notes || ''
    }).catch(function () {});
  }
};
</script>
