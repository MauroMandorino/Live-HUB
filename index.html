<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
@font-face { font-family:'Virage'; font-weight:600; font-style:normal; src:url('assets/fonts/Virage-Semibold.otf') format('opentype'); font-display:swap; }
@font-face { font-family:'Virage'; font-weight:700; font-style:normal; src:url('assets/fonts/Virage-Bold.otf') format('opentype'); font-display:swap; }
:root{
  --font-sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Virage','Geist',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;

  --bg:#F6F8FA;--surface:#fff;--surface2:#EAEEF1;
  --border:#E1E6F0;--border2:#a1a1a1;
  --text:#171717;--text2:#4d4d4d;--text3:#888888;
  --radius:0 12px 0 12px;--radius-sm:6px;
  --accent:#141428;--accent-press:#0c0c18;--accent-soft:rgba(20,20,40,.08);--accent-contrast:#fff;
  --psg-navy:#004070;--psg-red:#E30613;--psg-gold:#CEAB5D;

  --blue-bg:#e2edfd;--blue-tx:#0a5bc4;
  --green-bg:#e8f4ec;--green-tx:#11733d;
  --amber-bg:#fdf0d6;--amber-tx:#92580a;
  --purple-bg:#f6edd4;--purple-tx:#856316;
  --teal-bg:rgba(20,20,40,.06);--teal-tx:#141428;
  --coral-bg:#fbe6e4;--coral-tx:#c0291f;
  --grey-bg:#f0f1f3;--grey-tx:#5a6473;
  --red:#c0291f;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171717;--surface:#212121;--surface2:#2a2a2a;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
  --text:#f2f2f2;--text2:#b4b4b4;--text3:#888888;
  --accent:#7f8fdc;--accent-press:#a3b0e6;--accent-soft:rgba(127,143,220,.14);--accent-contrast:#141428;
  --blue-bg:#0a5bc4;--blue-tx:#e2edfd;
  --green-bg:#11733d;--green-tx:#e8f4ec;
  --amber-bg:#92580a;--amber-tx:#fdf0d6;
  --purple-bg:#856316;--purple-tx:#f6edd4;
  --teal-bg:rgba(127,143,220,.14);--teal-tx:#c7cef2;
  --coral-bg:#c0291f;--coral-tx:#fbe6e4;
  --grey-bg:#3a3f47;--grey-tx:#c2c8d1;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.container{max-width:900px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;gap:9px;color:var(--text)}
.logo img{height:28px;width:auto}
.logo i{color:var(--accent)}
.sub{font-size:14px;color:var(--text2);margin-top:4px;font-family:var(--font-sans)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;color:var(--text);font-family:var(--font-sans);text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-press);border-color:var(--accent-press)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-green{border-color:var(--green-tx);color:var(--green-tx)}
.btn-green:hover{background:var(--green-bg)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(192,41,31,.08)}
input,textarea{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font-sans);font-size:14px;outline:none}

.lang-switch{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lang-btn.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.top-strip{display:flex;justify-content:flex-end;margin-bottom:1rem}
.hero{position:relative;overflow:hidden;background:#141428;border-radius:var(--radius);padding:2rem 1.75rem;margin-bottom:1.75rem}
.hero .wm{position:absolute;right:-6%;bottom:-30%;width:60%;opacity:.10;filter:invert(1);pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero .logo{color:#fff}
.hero .sub{color:rgba(255,255,255,.78)}

.area-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:1.5rem}
.area-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;cursor:pointer;transition:border-color .15s,transform .1s}
.area-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.area-card.sel{border-width:2px}
.area-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
.area-nm{font-size:14px;font-weight:600}
.area-st{font-size:12px;color:var(--text2);margin-top:2px}
.pin-area{margin-top:1.75rem;padding-top:1.75rem;border-top:0.5px solid var(--border)}
.pin-row{display:flex;gap:8px;margin-top:10px}
.pin-row input{max-width:180px;flex:0 0 auto}
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px}
.alert-err{background:rgba(226,75,74,.1);color:var(--red);border:0.5px solid rgba(226,75,74,.3)}

.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.sub-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.sub-tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2);white-space:nowrap}
.sub-tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.panel{display:none}
.panel.active{display:block}
.placeholder{text-align:center;padding:3.5rem 1rem;color:var(--text3)}
.placeholder i{font-size:28px}
.placeholder .ph-title{font-size:14px;color:var(--text2);margin-top:10px;font-weight:600}
.placeholder .ph-sub{font-size:12px;margin-top:4px}

.ext-link-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--teal-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.ext-link-card .txt{font-size:13px;color:var(--teal-tx)}
.ext-link-card .txt strong{display:block;font-size:14px;margin-bottom:2px}
.ext-link-card .btn{border-color:var(--teal-tx);color:var(--teal-tx);background:var(--surface)}
.ext-link-card .btn:hover{background:var(--teal-bg)}

.tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2)}
.tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pending{background:var(--amber-bg);color:var(--amber-tx)}
.b-accepted{background:var(--green-bg);color:var(--green-tx)}
.b-declined{background:var(--coral-bg);color:var(--coral-tx)}
.idea-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.idea-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.idea-header:hover{background:var(--surface2)}
.idea-title{font-size:15px;font-weight:600}
.idea-meta{font-size:12px;color:var(--text3);margin-top:2px}
.idea-body{padding:0 1.25rem 1.25rem;display:none}
.idea-body.open{display:block}
.field-block{margin-top:.9rem}
.field-block label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.field-block .val{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.5}
.idea-actions{display:flex;gap:8px;margin-top:1.1rem;flex-wrap:wrap}
.decision-form{margin-top:1rem;padding:1rem;background:var(--surface2);border-radius:var(--radius-sm)}
.field-row{display:flex;gap:12px}
.field-row>div{flex:1}
.field-row input,.field-row select{margin-top:4px}

.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.cal-filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.cal-head{background:var(--surface2);text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);padding:6px 2px}
.cal-cell{background:var(--surface);min-height:74px;padding:4px;font-size:11px;cursor:pointer}
.cal-cell:hover{background:var(--surface2)}
.cal-empty{background:var(--bg);cursor:default}
.cal-today .cal-daynum{background:var(--text);color:var(--surface);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.cal-daynum{font-size:11px;color:var(--text2);margin-bottom:3px}
.cal-chip{border-radius:5px;padding:1px 5px;margin-bottom:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-blue{background:var(--blue-bg);color:var(--blue-tx)}
.cal-purple{background:var(--purple-bg);color:var(--purple-tx)}
.cal-gold{background:var(--purple-bg);color:var(--purple-tx)}
.cal-grey{background:var(--grey-bg);color:var(--grey-tx)}
.cal-coral{background:var(--coral-bg);color:var(--coral-tx)}
.cal-amber{background:var(--amber-bg);color:var(--amber-tx)}
.cal-more{font-size:10px;color:var(--text3)}
.badge.b-cal-blue{background:var(--blue-bg);color:var(--blue-tx)}
.badge.b-cal-purple{background:var(--purple-bg);color:var(--purple-tx)}
.badge.b-cal-gold{background:var(--purple-bg);color:var(--purple-tx)}
.badge.b-cal-grey{background:var(--grey-bg);color:var(--grey-tx)}
.badge.b-cal-coral{background:var(--coral-bg);color:var(--coral-tx)}
.badge.b-cal-amber{background:var(--amber-bg);color:var(--amber-tx)}
@media(max-width:600px){.cal-cell{min-height:56px;font-size:10px}.cal-chip{font-size:9px}}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--blue-tx);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.pres-type{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block}
.pres-oral{background:var(--purple-bg);color:var(--purple-tx)}
.pres-abstract{background:var(--teal-bg);color:var(--teal-tx)}
.pres-poster{background:var(--amber-bg);color:var(--amber-tx)}
.chip{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="container">

<div class="top-strip">
  <div class="lang-switch" id="lang-switch"></div>
</div>

<div id="screen-home">
  <div class="hero">
    <img class="wm" src="assets/logos/psg-watermark.svg" alt="" aria-hidden="true">
    <div class="hero-content">
      <div class="logo"><img src="assets/logos/psg-crest-white.svg" alt=""> <span data-t="hubTitle">Research Hub</span></div>
      <div class="sub" data-t="hubSub">Select your area and enter your access code</div>
    </div>
  </div>
  <div class="area-grid" id="area-list"></div>
  <div class="pin-area">
    <div style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px">
      <i class="ti ti-lock" style="font-size:15px"></i> <span data-t="pinLabel">Enter your area access code</span>
    </div>
    <div class="pin-row">
      <input type="password" id="pin-input" maxlength="12">
      <button class="btn btn-primary" onclick="checkPin()"><i class="ti ti-arrow-right"></i> <span data-t="accessBtn">Access</span></button>
    </div>
    <div id="pin-error" class="alert alert-err hidden" data-t="pinError">Incorrect code. Please try again.</div>
  </div>
</div>

<div id="screen-area" class="hidden">
  <div class="top-bar">
    <div>
      <div class="logo" id="area-name"></div>
      <div class="sub" id="area-owner"></div>
    </div>
    <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> <span data-t="logout">Log out</span></button>
  </div>
  <div class="sub-tabs" id="sub-tabs"></div>
  <div id="panels"></div>
</div>

</div>

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['en','fr','it','es'].map(function(l){
    return '<button class="lang-btn '+(l===lang?'active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>';
  }).join('');
}
function setLang(l){
  lang = l;
  try { localStorage.setItem('hubLang', l); } catch(e) {}
  renderLangSwitch();
  applyStaticText();
  renderHome();
  if (current) openArea(current, true);
}

function applyStaticText(){
  document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.dataset.t); });
  document.getElementById('pin-input').placeholder = t('pinLabel');
}

function renderHome(){
  document.getElementById('area-list').innerHTML = AREAS.map(function(a){
    return '<div class="area-card" id="ac-'+a.id+'" onclick="selectArea(\''+a.id+'\')">'+
      '<div class="area-icon" style="background:'+a.bg+';color:'+a.tx+'"><i class="ti '+a.icon+'"></i></div>'+
      '<div class="area-nm">'+I18N[lang].areas[a.key]+'</div>'+
      '<div class="area-st">'+a.subs.length+' '+(a.subs.length>1?t('subsections'):t('subsection'))+'</div></div>';
  }).join('');
}

function selectArea(id){
  selArea = id;
  AREAS.forEach(function(a){
    const el = document.getElementById('ac-' + a.id);
    el.classList.toggle('sel', a.id === id);
    el.style.borderColor = a.id === id ? a.tx : '';
  });
  document.getElementById('pin-input').focus();
}

function checkPin(){
  const pin = document.getElementById('pin-input').value.trim();
  const a = AREAS.find(function(x){ return x.pin === pin && (!selArea || x.id === selArea); });
  document.getElementById('pin-error').classList.toggle('hidden', !!a);
  if (a) openArea(a);
}

function openArea(a, keepSub){
  current = a;
  if (!keepSub) activeSub = a.subs[0].id;
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-area').classList.remove('hidden');
  document.getElementById('area-name').innerHTML = '<img src="assets/logos/psg-crest-black.svg" style="height:24px"> '+I18N[lang].areas[a.key];
  document.getElementById('area-owner').textContent = a.owner;
  document.getElementById('sub-tabs').innerHTML = a.subs.map(function(s){
    return '<div class="sub-tab '+(s.id===activeSub?'active':'')+'" onclick="setSub(\''+s.id+'\')">'+I18N[lang].subs[s.key]+'</div>';
  }).join('');
  renderPanels();
}

function setSub(id){
  activeSub = id;
  document.querySelectorAll('.sub-tab').forEach(function(el,i){ el.classList.toggle('active', current.subs[i].id === id); });
  renderPanels();
}

function renderPanels(){
  const container = document.getElementById('panels');
  container.innerHTML = current.subs.map(function(s){ return '<div class="panel '+(s.id===activeSub?'active':'')+'" id="panel-'+s.id+'"></div>'; }).join('');
  current.subs.forEach(function(s){
    if (s.type === 'ideas') {
      renderIdeasPanel();
      if (window.startIdeasListener) window.startIdeasListener();
    } else if (s.type === 'calendar') {
      renderCalendarPanel();
      if (window.startEventsListener) window.startEventsListener();
    } else if (s.type === 'rss') {
      renderRssPanel();
      if (window.startPdfRequestsListener) window.startPdfRequestsListener();
    } else if (s.type === 'tip') {
      renderTipPanel();
      if (window.startTipPostsListener) window.startTipPostsListener();
    } else if (s.type === 'phd') {
      renderPhdPanel();
      if (window.startAllPhdListeners) window.startAllPhdListeners();
    } else {
      const el = document.getElementById('panel-' + s.id);
      el.innerHTML = '<div class="card placeholder"><i class="ti ti-hammer"></i>'+
        '<div class="ph-title">'+esc(I18N[lang].subs[s.key])+' \u2014 '+t('comingTitle')+'</div>'+
        '<div class="ph-sub">'+t('comingSub')+'</div></div>';
    }
  });
}

  document.getElementById('pin-input').value = '';

function fmtDate(ts){
  if (!ts || !ts.toDate) return '';
  return ts.toDate().toLocaleDateString(I18N[lang].locale, {day:'numeric', month:'short', year:'numeric'});
}

function renderIdeasPanel(){
  const el = document.getElementById('panel-ideas');
  if (!el) return;
  let body;
  if (firebaseFailed) {
    body = '<div class="alert alert-err">'+t('offline')+'</div>';
  } else if (!firebaseReady) {
    body = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('connecting')+'</div></div>';
  } else {
    body = ideasMarkup();
  }
  el.innerHTML = extLinkMarkup() + body;
}

function ideasMarkup(){
  const list = ideaFilter === 'all' ? ideas : ideas.filter(function(i){ return i.status === ideaFilter; });
  const pendingCount = ideas.filter(function(i){ return i.status === 'pending'; }).length;
  const tabsHtml = '<div class="tabs">'+
    '<div class="tab '+(ideaFilter==='pending'?'active':'')+'" onclick="setIdeaFilter(\'pending\')">'+t('tPending')+'</div>'+
    '<div class="tab '+(ideaFilter==='accepted'?'active':'')+'" onclick="setIdeaFilter(\'accepted\')">'+t('tAccepted')+'</div>'+
    '<div class="tab '+(ideaFilter==='declined'?'active':'')+'" onclick="setIdeaFilter(\'declined\')">'+t('tDeclined')+'</div>'+
    '<div class="tab '+(ideaFilter==='all'?'active':'')+'" onclick="setIdeaFilter(\'all\')">'+t('tAll')+'</div></div>'+
    '<div class="sub" style="margin-bottom:1rem">'+t('pendingTotal')(pendingCount, ideas.length)+'</div>';

  if (!list.length) {
    return tabsHtml + '<div class="empty"><i class="ti ti-inbox" style="font-size:28px"></i><div style="margin-top:8px">'+t('emptyView')+'</div></div>';
  }

  return tabsHtml + list.map(function(i){
    return '<div class="idea-card">'+
      '<div class="idea-header" onclick="toggleIdea(\''+i.id+'\')"><div>'+
      '<div class="idea-title">'+esc(i.title)+'</div>'+
      '<div class="idea-meta">'+esc(i.submitterName)+' \u00b7 '+fmtDate(i.createdAt)+'</div></div>'+
      '<span class="badge b-'+i.status+'">'+i.status+'</span></div>'+
      '<div class="idea-body '+(openIdeaId===i.id?'open':'')+'">'+
      '<div class="field-block"><label>'+t('fSubmitter')+'</label><div class="val">'+esc(i.submitterName)+' \u2014 '+esc(i.submitterEmail)+'</div></div>'+
      '<div class="field-block"><label>'+t('fObjective')+'</label><div class="val">'+esc(i.objective)+'</div></div>'+
      '<div class="field-block"><label>'+t('fSample')+'</label><div class="val">'+esc(i.sample)+'</div></div>'+
      '<div class="field-block"><label>'+t('fMethods')+'</label><div class="val">'+esc(i.methods)+'</div></div>'+
      (i.links ? '<div class="field-block"><label>'+t('fLinks')+'</label><div class="val">'+esc(i.links)+'</div></div>' : '')+
      (i.notes ? '<div class="field-block"><label>'+t('fNotes')+'</label><div class="val">'+esc(i.notes)+'</div></div>' : '')+
      '<div class="field-block"><label>'+t('fScreeningNotes')+'</label>'+
      '<textarea rows="2" placeholder="'+t('fScreeningPh')+'" onblur="saveIdeaNote(\''+i.id+'\',this.value)">'+esc(i.screeningNotes)+'</textarea></div>'+
      (composing && composing.id === i.id ? decisionFormMarkup(i) :
      '<div class="idea-actions">'+
      (i.status!=='accepted' ? '<button class="btn btn-sm btn-green" onclick="openDecision(\''+i.id+'\',\'accepted\')"><i class="ti ti-check"></i> '+t('accept')+'</button>' : '')+
      (i.status!=='declined' ? '<button class="btn btn-sm btn-red" onclick="openDecision(\''+i.id+'\',\'declined\')"><i class="ti ti-x"></i> '+t('decline')+'</button>' : '')+
      (i.status!=='pending' ? '<button class="btn btn-sm" onclick="setIdeaStatus(\''+i.id+'\',\'pending\')"><i class="ti ti-refresh"></i> '+t('reset')+'</button>' : '')+
      '</div>')+
      '</div></div>';
  }).join('');
}

function decisionFormMarkup(i){
  const c = composing;
  const title = c.status === 'accepted' ? t('decisionTitleAccept') : t('decisionTitleDecline');
  return '<div class="decision-form">'+
    '<div class="field-block"><label>'+esc(title)+'</label></div>'+

    '<button class="btn btn-sm btn-primary" onclick="confirmDecision(\''+i.id+'\')"><i class="ti ti-send"></i> '+t('sendDecision')+'</button>'+
    '<button class="btn btn-sm" onclick="cancelDecision()">'+t('cancelBtn')+'</button>'+
    '</div></div>';
}

function openDecision(id, status){
  composing = { id: id, status: status, explain: '', meeting: false, date: '', time: '' };
  openIdeaId = id;
  renderIdeasPanel();
}
function cancelDecision(){ composing = null; renderIdeasPanel(); }
function updateDraft(field, val){ if (composing) composing[field] = val; }
function confirmDecision(id){
  if (!composing) return;
  const idea = ideas.find(function(x){ return x.id === id; });
  const draft = composing;
  composing = null;
  if (window.applyDecision) window.applyDecision(id, draft, idea);
}

function setIdeaFilter(f){ ideaFilter = f; renderIdeasPanel(); }
function toggleIdea(id){ openIdeaId = openIdeaId === id ? null : id; renderIdeasPanel(); }

function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function isoDate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function monthLabel(d){ const s = d.toLocaleDateString(I18N[lang].locale, {month:'long', year:'numeric'}); return s.charAt(0).toUpperCase()+s.slice(1); }
function dayHeaders(){
  const base = new Date(2024,0,1); // a Monday
  const out = [];
  for (let i=0;i<7;i++){ const d = new Date(base); d.setDate(base.getDate()+i); out.push(d.toLocaleDateString(I18N[lang].locale,{weekday:'short'})); }
  return out;
}

function changeMonth(delta){ calDate = new Date(calDate.getFullYear(), calDate.getMonth()+delta, 1); renderCalendarPanel(); }
function goToday(){ calDate = new Date(); calDate.setDate(1); renderCalendarPanel(); }
function setCalFilter(f){ calFilter = f; renderCalendarPanel(); }

function filteredEvents(){ return calFilter === 'all' ? events : events.filter(function(e){ return e.type === calFilter; }); }

function openAddEvent(dateStr){

function calendarGridMarkup(){
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const first = new Date(y, m, 1);
  const offset = (first.getDay() + 6) % 7; // Monday = 0
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
  const todayStr = isoDate(new Date());
  const evs = filteredEvents();

  let cells = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - offset + 1;
    if (dayNum < 1 || dayNum > daysInMonth) { cells += '<div class="cal-cell cal-empty"></div>'; continue; }
    const d = new Date(y, m, dayNum);
    const dStr = isoDate(d);
    const dayEvents = evs.filter(function(e){ return e.date === dStr; });
    const isToday = dStr === todayStr;
    cells += '<div class="cal-cell '+(isToday?'cal-today':'')+'" onclick="openAddEvent(\''+dStr+'\')">'+
      '<div class="cal-daynum">'+dayNum+'</div>'+
      dayEvents.slice(0,3).map(function(e){
        const c = EVENT_COLORS[e.type] || 'blue';
        return '<div class="cal-chip cal-'+c+'" onclick="event.stopPropagation();openEditEvent(\''+e.id+'\')">'+esc(e.title)+'</div>';
      }).join('') +
      (dayEvents.length > 3 ? '<div class="cal-more">+'+(dayEvents.length-3)+'</div>' : '') +
      '</div>';
  }

  const headers = dayHeaders().map(function(h){ return '<div class="cal-head">'+h+'</div>'; }).join('');

  return '<div class="cal-nav">'+
    '<button class="btn btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>'+
    '<div style="font-weight:600;font-size:15px">'+monthLabel(calDate)+'</div>'+
    '<button class="btn btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>'+
    '<button class="btn btn-sm" onclick="goToday()">'+t('cal').today+'</button>'+
    '</div>'+
    '<div class="cal-filters">'+
    '<div class="tab '+(calFilter==='all'?'active':'')+'" onclick="setCalFilter(\'all\')">'+t('cal').allTypes+'</div>'+
    EVENT_TYPES.map(function(ty){ return '<div class="tab '+(calFilter===ty?'active':'')+'" onclick="setCalFilter(\''+ty+'\')">'+t('cal')[ty]+'</div>'; }).join('')+
    '</div>'+
    '<div class="cal-grid">'+headers+cells+'</div>';
}

function upcomingListMarkup(){
  const todayStr = isoDate(new Date());
  const upcoming = filteredEvents().filter(function(e){ return e.date >= todayStr; }).sort(function(a,b){ return (a.date+a.time) < (b.date+b.time) ? -1 : 1; }).slice(0,8);
  if (!upcoming.length) return '<div class="empty"><i class="ti ti-calendar-off" style="font-size:26px"></i><div style="margin-top:8px">'+t('cal').noEvents+'</div></div>';
  return upcoming.map(function(e){
    const c = EVENT_COLORS[e.type] || 'blue';
    const dLabel = new Date(e.date+'T00:00:00').toLocaleDateString(I18N[lang].locale, {day:'numeric',month:'short',year:'numeric'});

      '<div class="idea-header"><div>'+

  tipEditing = { id: p.id, title: p.title, coverImage: p.coverImage || '', body: p.body || '', charts: JSON.parse(JSON.stringify(p.charts || [])) };

  renderTipPanel();
}

function handleTipImageFile(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  const statusEl = document.getElementById('tip-img-status');
  if (statusEl) statusEl.textContent = t('tip').compressing;
  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      const maxW = 1000;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.75;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length > 650000 && quality > 0.25) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); }
      if (tipEditing) tipEditing.coverImage = dataUrl;
      renderTipPanel();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function addTipChart(){ if (tipEditing) tipEditing.charts.push(newChart()); renderTipPanel(); }
function removeTipChart(idx){ if (tipEditing) tipEditing.charts.splice(idx,1); renderTipPanel(); }

function addChartRow(idx){ if (tipEditing) tipEditing.charts[idx].rows.push({label:'',value:''}); renderTipPanel(); }

function confirmSavePost(){
  if (!tipEditing || !tipEditing.title || !tipEditing.body) return;
  const cleanCharts = tipEditing.charts
    .map(function(c){ return { title: c.title, rows: c.rows.filter(function(r){ return r.label && r.value !== ''; }) }; })
    .filter(function(c){ return c.rows.length > 0; });
  const payload = { title: tipEditing.title, coverImage: tipEditing.coverImage, body: tipEditing.body, charts: cleanCharts };
  if (window.saveTipPost) window.saveTipPost(tipEditing.id, payload);
  tipEditing = null; tipListView = 'list';
}

    });
  });
  out.sort(function(a,b){ return (b.year||'').localeCompare(a.year||''); });
  return out;
}

function abstractsMarkup(){
  const list = allAbstracts();
  if (!list.length) return '<div class="empty"><i class="ti ti-microphone-off" style="font-size:26px"></i><div style="margin-top:8px">'+t('phdT').noAbstracts+'</div></div>';
  return list.map(function(p){
    return '<div class="pres-item" style="border-bottom:0.5px solid var(--border);padding:10px 0;display:flex;gap:10px;align-items:flex-start">'+
      '<span class="badge" style="background:var(--blue-bg);color:var(--blue-tx);flex-shrink:0">'+esc(p.year||'')+'</span>'+
      '<div style="flex:1;min-width:0">'+
      '<div style="font-size:13px;font-weight:600">'+esc(p.congress)+'</div>'+
      (p.description ? '<div style="font-size:12px;color:var(--text2);margin-top:2px">'+esc(p.description)+'</div>' : '')+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center">'+
      '<span class="pres-type pres-'+p.type+'">'+(p.type.charAt(0).toUpperCase()+p.type.slice(1))+'</span>'+
      '<span class="chip" style="background:var(--surface2);color:var(--text2)"><i class="ti ti-user" style="font-size:10px"></i> '+esc(p.student)+'</span>'+
      '<span class="chip" style="background:var(--surface2);color:var(--text2)"><i class="ti ti-book-2" style="font-size:10px"></i> '+esc(p.studyTitle)+'</span>'+
      '</div></div></div>';
  }).join('');
}

function phdStudyMarkup(s){
  const pp = phdPaperProgress(s.paperWriting || {});
  const ds = s.dataset || { name:'', link:'' };
  const pres = s.presentations || [];
  return '<div class="idea-card">'+
    '<div class="idea-header" style="cursor:default"><div>'+
    '<div class="idea-title">'+esc(s.title)+(s.published?' <span class="badge" style="background:var(--green-bg);color:var(--green-tx);margin-left:6px"><i class="ti ti-lock"></i> Published</span>':'')+'</div>'+
    '</div></div>'+
    '<div style="padding:0 1.25rem 1.25rem">'+
    (s.objectives ? '<div class="field-block"><label>Objectives</label><div class="val">'+esc(s.objectives)+'</div></div>' : '')+
    (ds.link ? '<div class="field-block"><label>Dataset</label><div class="val"><a href="'+esc(ds.link)+'" target="_blank" rel="noopener">'+esc(ds.name||'Dataset')+'</a></div></div>' : '')+
    '<div class="field-block"><label>Data collection</label><div class="val">'+phdStatusBadge((s.dataCollection||{}).status||'to_start')+(s.dataCollection&&s.dataCollection.notes?' \u2014 '+esc(s.dataCollection.notes):'')+'</div></div>'+
    '<div class="field-block"><label>Data analysis</label><div class="val">'+phdStatusBadge((s.dataAnalysis||{}).status||'to_start')+(s.dataAnalysis&&s.dataAnalysis.notes?' \u2014 '+esc(s.dataAnalysis.notes):'')+'</div></div>'+
    '<div class="field-block"><label>Paper writing</label><div class="val">'+phdStatusBadge((s.paperWriting||{}).status||'not_started')+' \u00b7 '+pp+'/4 sections</div></div>'+
    '<div class="field-block"><label>Submission</label><div class="val">'+phdStatusBadge((s.submission||{}).status||'not_submitted')+(s.submission&&s.submission.journal?' \u2014 '+esc(s.submission.journal):'')+'</div></div>'+
    (pres.length ? '<div class="field-block"><label>Presentations</label><div class="val">'+pres.map(function(p){ return esc(p.congress)+' ('+esc(p.year)+')'; }).join(', ')+'</div></div>' : '')+
    '</div></div>';
}

function renderPhdPanel(){
  const el = document.getElementById('panel-phd');
  if (!el) return;

  const tabsHtml = '<div class="tabs" style="margin-bottom:1.25rem">'+
    '<div class="tab '+(phdView==='students'?'active':'')+'" onclick="setPhdView(\'students\')">'+t('phdT').tabStudents+'</div>'+
    '<div class="tab '+(phdView==='abstracts'?'active':'')+'" onclick="setPhdView(\'abstracts\')">'+t('phdT').tabAbstracts+'</div>'+
    '</div>';

  if (phdView === 'abstracts') {
    el.innerHTML = tabsHtml + abstractsMarkup();
    return;
  }

  if (!phdSelected) {
    el.innerHTML = tabsHtml + '<div class="sub" style="margin-bottom:1rem;font-weight:600;color:var(--text)">'+t('phdT').studentsTitle+'</div>'+
      '<div class="area-grid">'+PHD_STUDENTS.map(function(st){
        return '<div class="area-card" onclick="selectPhdStudent(\''+st.id+'\')">'+
          '<div class="area-icon" style="background:var(--blue-bg);color:var(--blue-tx)"><i class="ti ti-user"></i></div>'+
          '<div class="area-nm">'+esc(st.name)+'</div>'+
          '<div class="area-st">'+esc(st.place)+'</div></div>';
      }).join('')+'</div>';
    return;
  }

  const student = PHD_STUDENTS.find(function(x){ return x.id === phdSelected; });
  let body;
  if (phdFailed) {
    body = '<div class="alert alert-err">'+t('offline')+'</div>';
  } else if (!phdReady) {
    body = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('connecting')+'</div></div>';
  } else if (!phdStudies.length) {
    body = '<div class="empty"><i class="ti ti-book-2" style="font-size:26px"></i><div style="margin-top:8px">'+t('phdT').noStudies+'</div></div>';
  } else {
    body = phdStudies.map(phdStudyMarkup).join('');
  }

  el.innerHTML = tabsHtml + '<div style="margin-bottom:1rem">'+
    '<button class="btn btn-sm" onclick="backToPhdList()"><i class="ti ti-arrow-left"></i> '+t('phdT').backToList+'</button>'+
    '</div>'+
    '<div class="sub" style="margin-bottom:1rem;font-weight:600;color:var(--text)">'+esc(student ? student.name : '')+' \u2014 '+phdStudies.length+' '+t('phdT').studiesCount+'</div>'+
    body;
}

window.setPhdView = setPhdView;

window.selectPhdStudent = selectPhdStudent;

window.onPhdStudiesUpdated = function(data){ phdStudies = data; phdReady = true; renderPhdPanel(); };

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdKgOZILgA_r6axtQKWWLqVaDBUkp6OKE",
  authDomain: "phd-tracker-22d93.firebaseapp.com",
  projectId: "phd-tracker-22d93",
  storageBucket: "phd-tracker-22d93.firebasestorage.app",
  messagingSenderId: "252875836800",
  appId: "1:252875836800:web:dc6575ffab316da3744565"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  if (window.onIdeasFailed) window.onIdeasFailed();
}

// TODO: replace with your own EmailJS credentials (emailjs.com — free tier, no backend needed).
// Use the same EmailJS account as submit-idea.html; create a separate template for decisions
// with variables: to_email, submitter_name, idea_title, decision, explanation, meeting_proposed, meeting_date, meeting_time.
const EMAILJS_PUBLIC_KEY = "YOUR_EMAILJS_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "YOUR_EMAILJS_SERVICE_ID";
const EMAILJS_TEMPLATE_ID_DECISION = "YOUR_EMAILJS_TEMPLATE_ID_DECISION";
if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') window.emailjs.init(EMAILJS_PUBLIC_KEY);

window.applyDecision = async function (id, draft, idea) {
  if (!db) return;
  await updateDoc(doc(db, 'researchIdeas', id), {
    status: draft.status,
    decisionMessage: draft.explain || '',
    meetingProposed: !!draft.meeting,
    meetingDate: draft.meeting ? (draft.date || '') : '',
    meetingTime: draft.meeting ? (draft.time || '') : ''
  });

  if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY' && idea) {
    window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID_DECISION, {
      to_email: idea.submitterEmail,
      submitter_name: idea.submitterName,
      idea_title: idea.title,
      decision: draft.status,
      explanation: draft.explain || '',
      meeting_proposed: draft.meeting ? 'yes' : 'no',
      meeting_date: draft.meeting ? (draft.date || '') : '',
      meeting_time: draft.meeting ? (draft.time || '') : ''
    }).catch(function () {});
  }
};

let started = false;
window.startIdeasListener = function () {
  if (started || !db) { if (!db && window.onIdeasFailed) window.onIdeasFailed(); return; }
  started = true;
  const q = query(collection(db, 'researchIdeas'), orderBy('createdAt', 'desc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onIdeasUpdated) window.onIdeasUpdated(data);
    },
    function () {
      if (window.onIdeasFailed) window.onIdeasFailed();
    }
  );
};

window.setIdeaStatus = async function (id, status) {
  if (!db) return;
  await updateDoc(doc(db, 'researchIdeas', id), { status: status });
};
window.saveIdeaNote = async function (id, val) {
  if (!db) return;
  await updateDoc(doc(db, 'researchIdeas', id), { screeningNotes: val });
};

let eventsStarted = false;
window.startEventsListener = function () {
  if (eventsStarted || !db) { if (!db && window.onEventsFailed) window.onEventsFailed(); return; }
  eventsStarted = true;
  const q = query(collection(db, 'researchEvents'), orderBy('date', 'asc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onEventsUpdated) window.onEventsUpdated(data);
    },
    function () {
      if (window.onEventsFailed) window.onEventsFailed();
    }
  );
};

window.saveEvent = async function (draft) {
  if (!db) return;
  const payload = { title: draft.title, type: draft.type, date: draft.date, time: draft.time || '', notes: draft.notes || '' };
  if (draft.id) {
    await updateDoc(doc(db, 'researchEvents', draft.id), payload);
  } else {
    await addDoc(collection(db, 'researchEvents'), payload);
  }
};
window.deleteEvent = async function (id) {
  if (!db) return;
  await deleteDoc(doc(db, 'researchEvents', id));
};

let pdfRequestsStarted = false;
window.startPdfRequestsListener = function () {
  if (pdfRequestsStarted || !db) { if (!db && window.onPdfRequestsFailed) window.onPdfRequestsFailed(); return; }
  pdfRequestsStarted = true;
  const q = query(collection(db, 'paperRequests'), orderBy('createdAt', 'desc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onPdfRequestsUpdated) window.onPdfRequestsUpdated(data);
    },
    function () {
      if (window.onPdfRequestsFailed) window.onPdfRequestsFailed();
    }
  );
};
window.setPdfRequestStatus = async function (id, status) {
  if (!db) return;
  await updateDoc(doc(db, 'paperRequests', id), { status: status });
};

// TODO: same EmailJS account/public key as the other templates.
// Template D — "PDF ready" — variables: to_email, article_title, pdf_link, note
const EMAILJS_TEMPLATE_ID_PDF_READY = "YOUR_EMAILJS_TEMPLATE_ID_PDF_READY";

window.sendPdfToRequester = async function (id, pdfLink, note, req) {
  if (!db) return;
  await updateDoc(doc(db, 'paperRequests', id), { status: 'fulfilled', pdfLink: pdfLink });
  if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY' && req) {
    window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID_PDF_READY, {
      to_email: req.requesterEmail,
      article_title: req.articleTitle,
      pdf_link: pdfLink,
      note: note || ''
    }).catch(function () {});
  }
};

let tipPostsStarted = false;
window.startTipPostsListener = function () {
  if (tipPostsStarted || !db) { if (!db && window.onTipPostsFailed) window.onTipPostsFailed(); return; }
  tipPostsStarted = true;
  const q = query(collection(db, 'tipPosts'), orderBy('createdAt', 'desc'));
  onSnapshot(q,

      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });

  );
};
window.saveTipPost = async function (id, payload) {
  if (!db) return;
  if (id) {
    await updateDoc(doc(db, 'tipPosts', id), payload);
  } else {
    await addDoc(collection(db, 'tipPosts'), Object.assign({ createdAt: serverTimestamp() }, payload));
  }
};
window.deleteTipPost = async function (id) {
  if (!db) return;
  await deleteDoc(doc(db, 'tipPosts', id));
};

let phdUnsub = null;
window.startPhdListener = function (studentId) {
  if (!db) { if (window.onPhdStudiesFailed) window.onPhdStudiesFailed(); return; }
  if (phdUnsub) { phdUnsub(); phdUnsub = null; }
  phdUnsub = onSnapshot(doc(db, 'universities', studentId),
    function (snap) {
      const data = snap.exists() ? (snap.data().studies || []) : [];
      if (window.onPhdStudiesUpdated) window.onPhdStudiesUpdated(data);
    },
    function () {
      if (window.onPhdStudiesFailed) window.onPhdStudiesFailed();
    }
  );
};

const PHD_STUDENT_IDS = ['parma','foro','valencia','verona','chieti'];
let phdAllStartedIds = {};
window.startAllPhdListeners = function () {
  if (!db) return;
  PHD_STUDENT_IDS.forEach(function (id) {
    if (phdAllStartedIds[id]) return;
    phdAllStartedIds[id] = true;
    onSnapshot(doc(db, 'universities', id), function (snap) {
      const data = snap.exists() ? (snap.data().studies || []) : [];
      if (window.onPhdAllDataUpdated) window.onPhdAllDataUpdated(id, data);
    }, function () {});
  });
};
</script>
