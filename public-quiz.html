<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
@font-face { font-family:'Virage'; font-weight:600; font-style:normal; src:url('assets/fonts/Virage-Semibold.otf') format('opentype'); font-display:swap; }
@font-face { font-family:'Virage'; font-weight:700; font-style:normal; src:url('assets/fonts/Virage-Bold.otf') format('opentype'); font-display:swap; }
:root{
  --font-sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Virage','Geist',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --bg:#F6F8FA;--surface:#fff;--surface2:#EAEEF1;
  --border:#E1E6F0;--border2:#a1a1a1;
  --text:#171717;--text2:#4d4d4d;--text3:#888888;
  --radius:0 12px 0 12px;--radius-sm:6px;
  --accent:#141428;--accent-press:#0c0c18;--accent-contrast:#fff;
  --blue-bg:#e2edfd;--blue-tx:#0a5bc4;
  --green-bg:#e8f4ec;--green-tx:#11733d;
  --coral-bg:#fbe6e4;--coral-tx:#c0291f;
  --gold-bg:#f6edd4;--gold-tx:#856316;
  --red:#c0291f;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171717;--surface:#212121;--surface2:#2a2a2a;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
  --text:#f2f2f2;--text2:#b4b4b4;--text3:#888888;
  --accent:#7f8fdc;--accent-press:#a3b0e6;--accent-contrast:#141428;
  --blue-bg:#0a5bc4;--blue-tx:#e2edfd;
  --green-bg:#11733d;--green-tx:#e8f4ec;
  --coral-bg:#c0291f;--coral-tx:#fbe6e4;
  --gold-bg:#856316;--gold-tx:#f6edd4;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.container{max-width:640px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;gap:9px;color:var(--text)}
.logo img{height:26px;width:auto}
.sub{font-size:14px;color:var(--text2);margin-top:4px}
.top-strip{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-link{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;border:1px solid transparent}
.nav-link:hover{background:var(--surface2)}
.nav-link.current{background:var(--accent);color:#fff}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hero{position:relative;overflow:hidden;background:#141428;border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem}
.hero .wm{position:absolute;right:-6%;bottom:-30%;width:55%;opacity:.10;filter:invert(1);pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero .logo{color:#fff}
.hero .sub{color:rgba(255,255,255,.78)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;margin-top:1.1rem}
label:first-child{margin-top:0}
input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font-sans);font-size:14px;outline:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--blue-bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;color:var(--text);font-family:var(--font-sans)}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent);width:100%;padding:12px;font-size:15px;margin-top:1.5rem}
.btn-primary:hover{background:var(--accent-press);border-color:var(--accent-press)}
.btn-sm{padding:6px 14px;font-size:13px;margin-top:0}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:1rem}
.alert-err{background:rgba(192,41,31,.1);color:var(--red);border:0.5px solid rgba(192,41,31,.3)}
.center-box{text-align:center;padding:2.5rem 1rem}
.welcome-user{font-size:14px;color:var(--text2);margin-bottom:1.5rem}
.timer-ring{width:64px;height:64px;margin:0 auto 1.5rem;position:relative}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:6}
.timer-ring .bg{stroke:var(--surface2)}
.timer-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 0.1s linear}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;font-family:var(--font-mono)}
.q-text{font-size:17px;font-weight:600;text-align:center;margin-bottom:1.5rem;line-height:1.4}
.opt-btn{display:block;width:100%;text-align:left;padding:12px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font-sans);font-size:14px;cursor:pointer;margin-bottom:10px}
.opt-btn:hover{background:var(--surface2)}
.opt-btn.correct{background:var(--green-bg);border-color:var(--green-tx);color:var(--green-tx)}
.opt-btn.wrong{background:var(--coral-bg);border-color:var(--coral-tx);color:var(--coral-tx)}
.opt-btn[disabled]{cursor:default}
.progress-label{text-align:center;font-size:12px;color:var(--text3);margin-bottom:1rem;font-family:var(--font-mono)}
.rank-row{display:flex;align-items:center;gap:12px;padding:.7rem 1rem;border-bottom:0.5px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--surface2);color:var(--text2);flex-shrink:0}
.rank-num.top1{background:var(--gold-bg);color:var(--gold-tx)}
.rank-name{flex:1;font-size:14px;font-weight:600}
.rank-score{font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--accent)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">

<div class="top-strip">
  <div class="nav-links" id="nav-links"></div>
  <div class="lang-switch" id="lang-switch"></div>
</div>

<div class="hero">
  <img class="wm" src="assets/logos/psg-watermark.svg" alt="" aria-hidden="true">
  <div class="hero-content">
    <div class="logo"><img src="assets/logos/psg-crest-white.svg" alt=""> <span data-t="pageTitle">Quiz Challenge</span></div>
    <div class="sub" data-t="pageSub">Answer fast — you have 10 seconds per question. Weekly leaderboard, reset every week.</div>
  </div>
</div>

<div id="app"></div>

</div>

<script>
let lang = 'en';
try { lang = localStorage.getItem('hubLang') || 'en'; } catch(e) {}
const I18N = {
  en: { pageTitle:'Quiz Challenge', pageSub:'Answer fast \u2014 you have 10 seconds per question. Winners announced every Monday.',
    username:'Full name', usernamePh:'e.g. Marco Rossi',
    startBtn:'Continue', invalidPin:'Please enter your name.',
    welcome:'Welcome', playQuiz:'Play this week\u2019s quiz', viewLeaderboard:'Last week\u2019s winners', logout:'Log out',
    connecting:'Connecting to the database...', offline:'Could not reach the database. Check your connection and reload.',
    noQuestions:'No quiz questions available yet.', question:'Question', of:'of', finished:'Quiz submitted!',
    submittedMsg:'Thanks for playing \u2014 results are announced every Monday morning.',
    alreadyPlayed:'You\u2019ve already played this week. Come back next Monday!',
    playAgain:'Back to menu', tabPlay:'Play', tabLeaderboard:'Leaderboard',
    thisWeek:'Last week\u2019s winners', noScores:'No one played last week.', points:'pts',
    gold:'1st place', silver:'2nd place', bronze:'3rd place' },
  it: { pageTitle:'Quiz Challenge', pageSub:'Rispondi veloce \u2014 hai 10 secondi a domanda. I vincitori vengono annunciati ogni luned\u00ec.',
    username:'Nome e cognome', usernamePh:'es. Marco Rossi',
    startBtn:'Continua', invalidPin:'Inserisci il tuo nome.',
    welcome:'Benvenuto', playQuiz:'Gioca il quiz di questa settimana', viewLeaderboard:'Vincitori della scorsa settimana', logout:'Esci',
    connecting:'Connessione al database...', offline:'Impossibile raggiungere il database. Controlla la connessione e ricarica.',
    noQuestions:'Nessuna domanda disponibile ancora.', question:'Domanda', of:'di', finished:'Quiz sottomesso!',
    submittedMsg:'Grazie per aver giocato \u2014 i risultati vengono annunciati ogni luned\u00ec mattina.',
    alreadyPlayed:'Hai gi\u00e0 giocato questa settimana. Torna luned\u00ec prossimo!',
    playAgain:'Torna al menu', tabPlay:'Gioca', tabLeaderboard:'Classifica',
    thisWeek:'Vincitori della scorsa settimana', noScores:'Nessuno ha giocato la scorsa settimana.', points:'pt',
    gold:'1\u00b0 posto', silver:'2\u00b0 posto', bronze:'3\u00b0 posto' },
  fr: { pageTitle:'Quiz Challenge', pageSub:'R\u00e9pondez vite \u2014 vous avez 10 secondes par question. Les gagnants sont annonc\u00e9s chaque lundi.',
    username:'Nom complet', usernamePh:'ex. Marco Rossi',
    startBtn:'Continuer', invalidPin:'Veuillez entrer votre nom.',
    welcome:'Bienvenue', playQuiz:'Jouer au quiz de cette semaine', viewLeaderboard:'Gagnants de la semaine derni\u00e8re', logout:'D\u00e9connexion',
    connecting:'Connexion \u00e0 la base de donn\u00e9es...', offline:"Impossible d'acc\u00e9der \u00e0 la base de donn\u00e9es. V\u00e9rifiez votre connexion et rechargez.",
    noQuestions:'Aucune question disponible pour l\u2019instant.', question:'Question', of:'sur', finished:'Quiz soumis !',
    submittedMsg:'Merci d\u2019avoir jou\u00e9 \u2014 les r\u00e9sultats sont annonc\u00e9s chaque lundi matin.',
    alreadyPlayed:'Vous avez d\u00e9j\u00e0 jou\u00e9 cette semaine. Revenez lundi prochain !',
    playAgain:'Retour au menu', tabPlay:'Jouer', tabLeaderboard:'Classement',
    thisWeek:'Gagnants de la semaine derni\u00e8re', noScores:'Personne n\u2019a jou\u00e9 la semaine derni\u00e8re.', points:'pts',
    gold:'1\u00e8re place', silver:'2\u00e8me place', bronze:'3\u00e8me place' },
  es: { pageTitle:'Quiz Challenge', pageSub:'Responde r\u00e1pido \u2014 tienes 10 segundos por pregunta. Los ganadores se anuncian cada lunes.',
    username:'Nombre completo', usernamePh:'ej. Marco Rossi',
    startBtn:'Continuar', invalidPin:'Por favor introduce tu nombre.',
    welcome:'Bienvenido', playQuiz:'Jugar el quiz de esta semana', viewLeaderboard:'Ganadores de la semana pasada', logout:'Cerrar sesi\u00f3n',
    connecting:'Conectando a la base de datos...', offline:'No se pudo conectar a la base de datos. Comprueba tu conexi\u00f3n y recarga.',
    noQuestions:'A\u00fan no hay preguntas disponibles.', question:'Pregunta', of:'de', finished:'\u00a1Quiz enviado!',
    submittedMsg:'Gracias por jugar \u2014 los resultados se anuncian cada lunes por la ma\u00f1ana.',
    alreadyPlayed:'Ya jugaste esta semana. \u00a1Vuelve el pr\u00f3ximo lunes!',
    playAgain:'Volver al men\u00fa', tabPlay:'Jugar', tabLeaderboard:'Ranking',
    thisWeek:'Ganadores de la semana pasada', noScores:'Nadie jug\u00f3 la semana pasada.', points:'pts',
    gold:'1er puesto', silver:'2\u00ba puesto', bronze:'3er puesto' }
};
function t(key){ return (I18N[lang] && I18N[lang][key]) || I18N.en[key]; }

const NAV_LABELS = {
  en: { overview:'Overview', idea:'Submit idea', calendar:'Calendar', papers:'Papers', library:'PDF Library', tip:'Tip of the week', phd:'PhD activities', quiz:'Quiz', tech:'Tech Stack' },
  it: { overview:'Panoramica', idea:'Sottometti idea', calendar:'Calendario', papers:'Articoli', library:'PDF Library', tip:'Tip of the week', phd:'PhD activities', quiz:'Quiz', tech:'Tech Stack' },
  fr: { overview:'Aper\u00e7u', idea:'Soumettre une id\u00e9e', calendar:'Calendrier', papers:'Articles', library:'PDF Library', tip:'Tip of the week', phd:'PhD activities', quiz:'Quiz', tech:'Tech Stack' },
  es: { overview:'Resumen', idea:'Enviar idea', calendar:'Calendario', papers:'Art\u00edculos', library:'PDF Library', tip:'Tip of the week', phd:'PhD activities', quiz:'Quiz', tech:'Tech Stack' }
};
const NAV_PAGES = [
  { key:'overview', href:'public.html' },
  { key:'idea', href:'public-idea.html' },
  { key:'calendar', href:'public-calendar.html' },
  { key:'papers', href:'public-papers.html' },
  { key:'library', href:'public-library.html' },
  { key:'tip', href:'public-tip.html' },
  { key:'phd', href:'public-phd.html' },
  { key:'quiz', href:'public-quiz.html' },
  { key:'tech', href:'public-techstack.html' }
];
function renderNav(){
  document.getElementById('nav-links').innerHTML = NAV_PAGES.map(function(p){
    const isCurrent = p.href === 'public-quiz.html';
    return '<a class="nav-link '+(isCurrent?'current':'')+'" href="'+p.href+'">'+NAV_LABELS[lang][p.key]+'</a>';
  }).join('');
}
function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['en','fr','it','es'].map(function(l){
    return '<button class="lang-btn '+(l===lang?'active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>';
  }).join('');
}
function applyStaticText(){ document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.dataset.t); }); }
function setLang(l){ lang = l; try { localStorage.setItem('hubLang', l); } catch(e) {} renderLangSwitch(); renderNav(); applyStaticText(); render(); }
window.setLang = setLang;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---- Week key (ISO week) ---- */
function getWeekKey(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (date.getUTCDay() + 6) % 7;
  date.setUTCDate(date.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(date.getUTCFullYear(), 0, 4));
  const weekNum = 1 + Math.round(((date - firstThursday) / 86400000 - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7);
  return date.getUTCFullYear() + '-W' + String(weekNum).padStart(2, '0');
}
window.CURRENT_WEEK_KEY = getWeekKey(new Date());

// The quiz question bank rotates automatically: week 1 = the week this was launched,
// cycling through 30 designated weeks, then looping back to week 1.
const QUIZ_CYCLE_LENGTH = 30;
function mondayOf(d){
  const date = new Date(d);
  const day = (date.getDay() + 6) % 7;
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() - day);
  return date;
}
// TODO: set this to the Monday of the week you want week 1 to start (YYYY, monthIndex 0-based, day)
const QUIZ_WEEK1_START = mondayOf(new Date(2026, 6, 6)); // Monday 2026-07-06
function currentQuizWeekIndex(){
  const now = mondayOf(new Date());
  const diffWeeks = Math.round((now - QUIZ_WEEK1_START) / (7*24*60*60*1000));
  const idx = ((diffWeeks % QUIZ_CYCLE_LENGTH) + QUIZ_CYCLE_LENGTH) % QUIZ_CYCLE_LENGTH;
  return idx + 1; // 1..30
}

/* ---- App state ---- */
let view = 'login'; // login | menu | quiz | result | leaderboard
let currentUser = null;
try { currentUser = JSON.parse(localStorage.getItem('quizUser') || 'null'); } catch(e) {}
let loginError = '';
let quizQuestions = [], quizReady = false, quizFailed = false;
let leaderboard = [], leaderboardReady = false, leaderboardFailed = false;

let activeQuestions = [];
let qIndex = 0;
let correctCount = 0;
let totalPoints = 0;
let timeLeft = 10;
let timerInterval = null;
let answered = false;

function render(){
  const el = document.getElementById('app');
  if (view === 'login') { el.innerHTML = loginMarkup(); return; }
  if (view === 'menu') { el.innerHTML = menuMarkup(); return; }
  if (view === 'quiz') { el.innerHTML = quizMarkup(); return; }
  if (view === 'result') { el.innerHTML = resultMarkup(); return; }
  if (view === 'leaderboard') { el.innerHTML = leaderboardMarkup(); return; }
}

/* ---- Login ---- */
function loginMarkup(){
  return '<div class="card">'+
    '<label>'+t('username')+'</label><input type="text" id="li-username" placeholder="'+t('usernamePh')+'" maxlength="60">'+
    (loginError ? '<div class="alert alert-err">'+esc(loginError)+'</div>' : '')+
    '<button class="btn btn-primary" onclick="submitLogin()"><i class="ti ti-login"></i> '+t('startBtn')+'</button>'+
    '</div>';
}
function submitLogin(){
  const username = document.getElementById('li-username').value.trim();
  if (!username) { loginError = t('invalidPin'); render(); return; }
  loginError = '';
  currentUser = { username: username };
  try { localStorage.setItem('quizUser', JSON.stringify(currentUser)); } catch(e) {}
  view = 'menu';
  render();
  if (window.checkAlreadyPlayed) window.checkAlreadyPlayed(currentUser.username, window.CURRENT_WEEK_KEY);
}
window.submitLogin = submitLogin;

/* ---- Menu ---- */
let alreadyPlayedThisWeek = false;

function menuMarkup(){
  let playBtn;
  if (!quizQuestions.length) {
    playBtn = '<div class="alert alert-err">'+t('noQuestions')+'</div>';
  } else if (alreadyPlayedThisWeek) {
    playBtn = '<div class="alert" style="background:var(--blue-bg);color:var(--blue-tx);text-align:center">'+t('alreadyPlayed')+'</div>';
  } else {
    playBtn = '<button class="btn btn-primary" onclick="startQuiz()"><i class="ti ti-player-play"></i> '+t('playQuiz')+'</button>';
  }
  return '<div class="card center-box">'+
    '<div class="welcome-user">'+t('welcome')+', <strong>'+esc(currentUser.username)+'</strong></div>'+
    playBtn+
    '<button class="btn" style="margin-top:.75rem;width:100%" onclick="goLeaderboard()"><i class="ti ti-trophy"></i> '+t('viewLeaderboard')+'</button>'+
    '<button class="btn" style="margin-top:.75rem;width:100%;border-color:transparent;color:var(--text3)" onclick="logoutUser()">'+t('logout')+'</button>'+
    '</div>';
}
function logoutUser(){ currentUser = null; try { localStorage.removeItem('quizUser'); } catch(e) {} view = 'login'; render(); }
window.logoutUser = logoutUser;
window.onAlreadyPlayedChecked = function(played){ alreadyPlayedThisWeek = played; if (view === 'menu') render(); };

/* ---- Quiz ---- */
function shuffle(arr){ const a = arr.slice(); for (let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }

function startQuiz(){
  if (!quizQuestions.length || alreadyPlayedThisWeek) return;
  const wk = currentQuizWeekIndex();
  let pool = quizQuestions.filter(function(q){ return (q.week || 1) === wk; });
  if (!pool.length) pool = quizQuestions; // fallback if this week has no assigned questions yet
  activeQuestions = shuffle(pool).slice(0, Math.min(5, pool.length));
  qIndex = 0; correctCount = 0; totalPoints = 0;
  view = 'quiz';
  render();
  beginQuestionTimer();
}

function beginQuestionTimer(){
  answered = false;
  timeLeft = 10;
  updateTimerUI();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; updateTimerUI(); clearInterval(timerInterval); if (!answered) selectAnswer(-1); }
    else { updateTimerUI(); }
  }, 100);
}
function updateTimerUI(){
  const circle = document.getElementById('timer-fg');
  const num = document.getElementById('timer-num');
  if (!circle || !num) return;
  const circumference = 2 * Math.PI * 28;
  circle.style.strokeDashoffset = circumference * (1 - timeLeft / 10);
  num.textContent = Math.max(0, Math.ceil(timeLeft));
}

function quizMarkup(){
  const q = activeQuestions[qIndex];
  return '<div class="card">'+
    '<div class="timer-ring"><svg width="64" height="64"><circle class="bg" cx="32" cy="32" r="28"></circle>'+
    '<circle class="fg" id="timer-fg" cx="32" cy="32" r="28" stroke-dasharray="'+(2*Math.PI*28)+'" stroke-dashoffset="0"></circle></svg>'+
    '<div class="timer-num" id="timer-num">10</div></div>'+
    '<div class="progress-label">'+t('question')+' '+(qIndex+1)+' '+t('of')+' '+activeQuestions.length+'</div>'+
    '<div class="q-text">'+esc(q.question)+'</div>'+
    '<div id="opts">'+q.options.map(function(o, i){ return '<button class="opt-btn" onclick="selectAnswer('+i+')">'+esc(o)+'</button>'; }).join('')+'</div>'+
    '</div>';
}

function selectAnswer(idx){
  if (answered) return;
  answered = true;
  if (timerInterval) clearInterval(timerInterval);
  const q = activeQuestions[qIndex];
  const buttons = document.querySelectorAll('#opts .opt-btn');
  buttons.forEach(function(b, i){
    b.disabled = true;
    if (i === q.correctIndex) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  if (idx === q.correctIndex) {
    correctCount++;
    // Speed + correctness scoring: faster correct answers earn more points (20-100 per question)
    const points = Math.round(20 + 80 * Math.max(0, Math.min(1, timeLeft / 10)));
    totalPoints += points;
  }
  setTimeout(function(){
    qIndex++;
    if (qIndex >= activeQuestions.length) { finishQuiz(); }
    else { render(); beginQuestionTimer(); }
  }, 900);
}
window.selectAnswer = selectAnswer;
window.startQuiz = startQuiz;

function finishQuiz(){
  view = 'result';
  render();
  alreadyPlayedThisWeek = true;
  if (window.submitQuizScore) window.submitQuizScore(currentUser.username, totalPoints);
}
function resultMarkup(){
  return '<div class="card center-box">'+
    '<i class="ti ti-circle-check" style="font-size:40px;color:var(--accent)"></i>'+
    '<div style="font-size:18px;font-weight:600;margin:1rem 0 .4rem">'+t('finished')+'</div>'+
    '<div class="sub">'+t('submittedMsg')+'</div>'+
    '<button class="btn btn-primary" onclick="backToMenu()">'+t('playAgain')+'</button>'+
    '</div>';
}
function backToMenu(){ view = 'menu'; render(); }
window.backToMenu = backToMenu;

/* ---- Leaderboard (previous week's winners, medal-style) ---- */
function goLeaderboard(){ view = 'leaderboard'; render(); if (window.startLeaderboardListener) window.startLeaderboardListener(); }
window.goLeaderboard = goLeaderboard;

function medalRow(r, place){
  const medalClass = place === 1 ? 'top1' : '';
  const icon = place === 1 ? 'ti-medal' : (place === 2 ? 'ti-medal-2' : 'ti-medal-2');
  const label = place === 1 ? t('gold') : (place === 2 ? t('silver') : t('bronze'));
  return '<div class="rank-row"><div class="rank-num '+medalClass+'"><i class="ti '+icon+'"></i></div>'+
    '<div class="rank-name">'+esc(r.username)+'<div style="font-size:11px;color:var(--text3);font-weight:400">'+label+'</div></div>'+
    '<div class="rank-score">'+r.score+' '+t('points')+'</div></div>';
}

function leaderboardMarkup(){
  let body;
  if (leaderboardFailed) { body = '<div class="alert alert-err">'+t('offline')+'</div>'; }
  else if (!leaderboardReady) { body = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('connecting')+'</div></div>'; }
  else if (!leaderboard.length) { body = '<div class="empty"><i class="ti ti-trophy-off" style="font-size:24px"></i><div style="margin-top:8px">'+t('noScores')+'</div></div>'; }
  else {
    body = leaderboard.slice(0,3).map(function(r, i){ return medalRow(r, i+1); }).join('');
  }
  return '<div class="card">'+
    '<button class="btn btn-sm" onclick="backToMenu()" style="margin-bottom:1rem"><i class="ti ti-arrow-left"></i> '+t('playAgain')+'</button>'+
    '<div class="sub" style="font-weight:600;color:var(--text);margin-bottom:1rem"><i class="ti ti-trophy" style="color:var(--gold-tx)"></i> '+t('thisWeek')+'</div>'+
    body+
    '</div>';
}

window.onQuizQuestionsUpdated = function(data){ quizQuestions = data; quizReady = true; if (view === 'menu') render(); };
window.onQuizQuestionsFailed = function(){ quizFailed = true; };
window.onLeaderboardUpdated = function(data){ leaderboard = data.sort(function(a,b){ return b.score - a.score; }); leaderboardReady = true; if (view==='leaderboard') render(); };
window.onLeaderboardFailed = function(){ leaderboardFailed = true; if (view==='leaderboard') render(); };

renderNav();
renderLangSwitch();
applyStaticText();
if (currentUser) view = 'menu';
render();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, setDoc, onSnapshot, query, orderBy, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdKgOZILgA_r6axtQKWWLqVaDBUkp6OKE",
  authDomain: "phd-tracker-22d93.firebaseapp.com",
  projectId: "phd-tracker-22d93",
  storageBucket: "phd-tracker-22d93.firebasestorage.app",
  messagingSenderId: "252875836800",
  appId: "1:252875836800:web:dc6575ffab316da3744565"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  if (window.onQuizQuestionsFailed) window.onQuizQuestionsFailed();
}

if (db) {
  const q = query(collection(db, 'quizQuestions'), orderBy('createdAt', 'desc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onQuizQuestionsUpdated) window.onQuizQuestionsUpdated(data);
    },
    function () { if (window.onQuizQuestionsFailed) window.onQuizQuestionsFailed(); }
  );
} else {
  if (window.onQuizQuestionsFailed) window.onQuizQuestionsFailed();
}

window.checkAlreadyPlayed = async function (username, weekKey) {
  if (!db) { if (window.onAlreadyPlayedChecked) window.onAlreadyPlayedChecked(false); return; }
  try {
    const ref = doc(db, 'quizScores', username + '__' + weekKey);
    const snap = await getDoc(ref);
    if (window.onAlreadyPlayedChecked) window.onAlreadyPlayedChecked(snap.exists());
  } catch (e) {
    if (window.onAlreadyPlayedChecked) window.onAlreadyPlayedChecked(false);
  }
};

window.submitQuizScore = async function (username, correctCount) {
  if (!db) return;
  const weekKey = window.CURRENT_WEEK_KEY || '';
  try {
    const id = username + '__' + weekKey;
    const ref = doc(db, 'quizScores', id);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      await setDoc(ref, { username: username, week: weekKey, score: increment(correctCount), updatedAt: serverTimestamp() }, { merge: true });
    } else {
      await setDoc(ref, { username: username, week: weekKey, score: correctCount, updatedAt: serverTimestamp() });
    }
  } catch (e) {}
};

let leaderboardStarted = false;
window.startLeaderboardListener = function () {
  if (leaderboardStarted || !db) { if (!db && window.onLeaderboardFailed) window.onLeaderboardFailed(); return; }
  leaderboardStarted = true;
  const prevWeekDate = new Date();
  prevWeekDate.setDate(prevWeekDate.getDate() - 7);
  const prevWeekKey = getWeekKey(prevWeekDate);
  const q = query(collection(db, 'quizScores'), orderBy('score', 'desc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return d.data(); }).filter(function(r){ return r.week === prevWeekKey; });
      if (window.onLeaderboardUpdated) window.onLeaderboardUpdated(data);
    },
    function () { if (window.onLeaderboardFailed) window.onLeaderboardFailed(); }
  );
};
</script>
</body>
