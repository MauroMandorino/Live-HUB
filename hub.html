<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f1efe8;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --radius:12px;--radius-sm:8px;
  --blue-bg:#E6F1FB;--blue-tx:#0C447C;
  --green-bg:#EAF3DE;--green-tx:#27500A;
  --amber-bg:#FAEEDA;--amber-tx:#633806;
  --purple-bg:#EEEDFE;--purple-tx:#3C3489;
  --teal-bg:#E1F5EE;--teal-tx:#085041;
  --coral-bg:#FAECE7;--coral-tx:#712B13;
  --red:#E24B4A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --text:#f0ece4;--text2:#b4b2a9;--text3:#888780;
  --blue-bg:#0C447C;--blue-tx:#B5D4F4;
  --green-bg:#27500A;--green-tx:#C0DD97;
  --amber-bg:#633806;--amber-tx:#FAC775;
  --purple-bg:#3C3489;--purple-tx:#CECBF6;
  --teal-bg:#085041;--teal-tx:#9FE1CB;
  --coral-bg:#712B13;--coral-tx:#F5C4B3;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.container{max-width:900px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo i{color:var(--blue-tx)}
.sub{font-size:14px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--text);color:var(--surface);border-color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-green{border-color:var(--green-tx);color:var(--green-tx)}
.btn-green:hover{background:var(--green-bg)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(226,75,74,.08)}
input,textarea{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;outline:none}

/* home / area selection */
.area-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:1.5rem}
.area-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;cursor:pointer;transition:border-color .15s,transform .1s}
.area-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.area-card.sel{border-width:2px}
.area-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
.area-nm{font-size:14px;font-weight:600}
.area-st{font-size:12px;color:var(--text2);margin-top:2px}
.pin-area{margin-top:1.75rem;padding-top:1.75rem;border-top:0.5px solid var(--border)}
.pin-row{display:flex;gap:8px;margin-top:10px}
.pin-row input{max-width:180px;flex:0 0 auto}
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px}
.alert-err{background:rgba(226,75,74,.1);color:var(--red);border:0.5px solid rgba(226,75,74,.3)}

/* area dashboard */
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}
.sub-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.sub-tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2);white-space:nowrap}
.sub-tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.panel{display:none}
.panel.active{display:block}
.placeholder{text-align:center;padding:3.5rem 1rem;color:var(--text3)}
.placeholder i{font-size:28px}
.placeholder .ph-title{font-size:14px;color:var(--text2);margin-top:10px;font-weight:600}
.placeholder .ph-sub{font-size:12px;margin-top:4px}

/* idea screening */
.tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2)}
.tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pending{background:var(--amber-bg);color:var(--amber-tx)}
.b-accepted{background:var(--green-bg);color:var(--green-tx)}
.b-declined{background:var(--coral-bg);color:var(--coral-tx)}
.idea-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.idea-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.idea-header:hover{background:var(--surface2)}
.idea-title{font-size:15px;font-weight:600}
.idea-meta{font-size:12px;color:var(--text3);margin-top:2px}
.idea-body{padding:0 1.25rem 1.25rem;display:none}
.idea-body.open{display:block}
.field-block{margin-top:.9rem}
.field-block label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.field-block .val{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.5}
.idea-actions{display:flex;gap:8px;margin-top:1.1rem;flex-wrap:wrap}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--text2);font-size:14px;gap:10px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue-tx);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">

<div id="loading" class="loading-screen">
  <div class="spinner"></div>
  <div>Connecting to database...</div>
</div>

<div id="screen-home" class="hidden">
  <div style="margin-bottom:1rem">
    <div class="logo"><i class="ti ti-hexagon-3d" style="font-size:22px"></i> Research Hub</div>
    <div class="sub">Select your area and enter your access code</div>
  </div>
  <div class="area-grid" id="area-list"></div>
  <div class="pin-area">
    <div style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px">
      <i class="ti ti-lock" style="font-size:15px"></i> Enter your area access code
    </div>
    <div class="pin-row">
      <input type="password" id="pin-input" placeholder="Access code" maxlength="12">
      <button class="btn btn-primary" onclick="checkPin()"><i class="ti ti-arrow-right"></i> Access</button>
    </div>
    <div id="pin-error" class="alert alert-err hidden">Incorrect code. Please try again.</div>
  </div>
</div>

<div id="screen-area" class="hidden">
  <div class="top-bar">
    <div>
      <div class="logo" id="area-name"></div>
      <div class="sub" id="area-owner"></div>
    </div>
    <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Log out</button>
  </div>
  <div class="sub-tabs" id="sub-tabs"></div>
  <div id="panels"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdKgOZILgA_r6axtQKWWLqVaDBUkp6OKE",
  authDomain: "phd-tracker-22d93.firebaseapp.com",
  projectId: "phd-tracker-22d93",
  storageBucket: "phd-tracker-22d93.firebasestorage.app",
  messagingSenderId: "252875836800",
  appId: "1:252875836800:web:dc6575ffab316da3744565"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// One access code per area owner. Change these before going live.
const AREAS = [
  { id:'research',  name:'Research',          owner:'Area owner', pin:'RES-2026',  icon:'ti-microscope',  bg:'#E1F5EE', tx:'#085041',
    subs:[
      {id:'ideas',    label:'Idea screening',  type:'ideas'},
      {id:'calendar', label:'Research calendar', type:'placeholder'},
      {id:'tip',      label:'Tip of the week', type:'placeholder'},
      {id:'rss',      label:'Papers RSS',      type:'placeholder'},
      {id:'phd',      label:'PhD activities',  type:'placeholder'}
    ]},
  { id:'techstack', name:'Tech stack',        owner:'Area owner', pin:'TECH-2026', icon:'ti-code',        bg:'#E6F1FB', tx:'#0C447C',
    subs:[ {id:'overview', label:'Overview', type:'placeholder'} ]},
  { id:'designviz', name:'Design & Viz',      owner:'Area owner', pin:'DSGN-2026', icon:'ti-chart-dots',  bg:'#EEEDFE', tx:'#3C3489',
    subs:[ {id:'overview', label:'Overview', type:'placeholder'} ]},
  { id:'quarterly', name:'Quarterly update',  owner:'Area owner', pin:'QTR-2026',  icon:'ti-calendar-stats', bg:'#FAEEDA', tx:'#633806',
    subs:[ {id:'overview', label:'Overview', type:'placeholder'} ]},
  { id:'education', name:'Education',        owner:'Area owner', pin:'EDU-2026',  icon:'ti-school',      bg:'#FAECE7', tx:'#712B13',
    subs:[ {id:'overview', label:'Overview', type:'placeholder'} ]}
];

let selArea = null, current = null, activeSub = null;
let ideas = [], ideasUnsub = null, ideaFilter = 'pending', openIdeaId = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.renderHome = function () {
  document.getElementById('area-list').innerHTML = AREAS.map(a => `
    <div class="area-card" id="ac-${a.id}" onclick="selectArea('${a.id}')">
      <div class="area-icon" style="background:${a.bg};color:${a.tx}"><i class="ti ${a.icon}"></i></div>
      <div class="area-nm">${a.name}</div>
      <div class="area-st">${a.subs.length} subsection${a.subs.length>1?'s':''}</div>
    </div>`).join('');
};

window.selectArea = function (id) {
  selArea = id;
  AREAS.forEach(a => {
    const el = document.getElementById('ac-' + a.id);
    el.classList.toggle('sel', a.id === id);
    el.style.borderColor = a.id === id ? a.tx : '';
  });
  document.getElementById('pin-input').focus();
};

window.checkPin = function () {
  const pin = document.getElementById('pin-input').value.trim();
  const a = AREAS.find(x => x.pin === pin && (!selArea || x.id === selArea));
  document.getElementById('pin-error').classList.toggle('hidden', !!a);
  if (a) openArea(a);
};

function openArea(a) {
  current = a;
  activeSub = a.subs[0].id;
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-area').classList.remove('hidden');
  document.getElementById('area-name').innerHTML = `<i class="ti ${a.icon}" style="color:${a.tx}"></i> ${a.name}`;
  document.getElementById('area-owner').textContent = a.owner;
  document.getElementById('sub-tabs').innerHTML = a.subs.map(s =>
    `<div class="sub-tab ${s.id===activeSub?'active':''}" onclick="setSub('${s.id}')">${s.label}</div>`).join('');
  renderPanels();
}

window.setSub = function (id) {
  activeSub = id;
  document.querySelectorAll('.sub-tab').forEach((t,i) => t.classList.toggle('active', current.subs[i].id === id));
  renderPanels();
};

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = current.subs.map(s => `<div class="panel ${s.id===activeSub?'active':''}" id="panel-${s.id}"></div>`).join('');
  current.subs.forEach(s => {
    const el = document.getElementById('panel-' + s.id);
    if (s.type === 'ideas') {
      el.innerHTML = ideasMarkup();
      if (!ideasUnsub) listenIdeas();
    } else {
      el.innerHTML = `<div class="card placeholder">
        <i class="ti ti-hammer"></i>
        <div class="ph-title">${esc(s.label)} — coming soon</div>
        <div class="ph-sub">This module will be built next inside the same hub.</div>
      </div>`;
    }
  });
}

window.logout = function () {
  current = selArea = null;
  if (ideasUnsub) { ideasUnsub(); ideasUnsub = null; }
  document.getElementById('screen-area').classList.add('hidden');
  document.getElementById('screen-home').classList.remove('hidden');
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').classList.add('hidden');
  AREAS.forEach(a => { const el = document.getElementById('ac-'+a.id); el.classList.remove('sel'); el.style.borderColor=''; });
};

/* ---- Idea screening module ---- */
function listenIdeas() {
  const q = query(collection(db, 'researchIdeas'), orderBy('createdAt', 'desc'));
  ideasUnsub = onSnapshot(q, snap => {
    ideas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (activeSub === 'ideas') document.getElementById('panel-ideas').innerHTML = ideasMarkup();
  });
}

function fmtDate(ts){ if(!ts||!ts.toDate) return ''; return ts.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

function ideasMarkup() {
  const list = ideaFilter === 'all' ? ideas : ideas.filter(i => i.status === ideaFilter);
  const pendingCount = ideas.filter(i => i.status === 'pending').length;
  const tabsHtml = `
    <div class="tabs">
      <div class="tab ${ideaFilter==='pending'?'active':''}" onclick="setIdeaFilter('pending')">Pending</div>
      <div class="tab ${ideaFilter==='accepted'?'active':''}" onclick="setIdeaFilter('accepted')">Accepted</div>
      <div class="tab ${ideaFilter==='declined'?'active':''}" onclick="setIdeaFilter('declined')">Declined</div>
      <div class="tab ${ideaFilter==='all'?'active':''}" onclick="setIdeaFilter('all')">All</div>
    </div>
    <div class="sub" style="margin-bottom:1rem">${pendingCount} pending · ${ideas.length} total submissions</div>`;

  if (!list.length) {
    return tabsHtml + `<div class="empty"><i class="ti ti-inbox" style="font-size:28px"></i><div style="margin-top:8px">No ideas in this view</div></div>`;
  }

  return tabsHtml + list.map(i => `
    <div class="idea-card">
      <div class="idea-header" onclick="toggleIdea('${i.id}')">
        <div>
          <div class="idea-title">${esc(i.title)}</div>
          <div class="idea-meta">${esc(i.submitterName)} · ${fmtDate(i.createdAt)}</div>
        </div>
        <span class="badge b-${i.status}">${i.status}</span>
      </div>
      <div class="idea-body ${openIdeaId===i.id?'open':''}">
        <div class="field-block"><label>Submitter</label><div class="val">${esc(i.submitterName)} — ${esc(i.submitterEmail)}</div></div>
        <div class="field-block"><label>Objective</label><div class="val">${esc(i.objective)}</div></div>
        <div class="field-block"><label>Sample</label><div class="val">${esc(i.sample)}</div></div>
        <div class="field-block"><label>Methods</label><div class="val">${esc(i.methods)}</div></div>
        ${i.links ? `<div class="field-block"><label>Related links</label><div class="val">${esc(i.links)}</div></div>` : ''}
        ${i.notes ? `<div class="field-block"><label>Additional notes</label><div class="val">${esc(i.notes)}</div></div>` : ''}
        <div class="field-block">
          <label>Screening notes</label>
          <textarea rows="2" placeholder="Optional note (visible only to the area owner)" onblur="saveIdeaNote('${i.id}',this.value)">${esc(i.screeningNotes)}</textarea>
        </div>
        <div class="idea-actions">
          ${i.status!=='accepted' ? `<button class="btn btn-sm btn-green" onclick="setIdeaStatus('${i.id}','accepted')"><i class="ti ti-check"></i> Accept</button>` : ''}
          ${i.status!=='declined' ? `<button class="btn btn-sm btn-red" onclick="setIdeaStatus('${i.id}','declined')"><i class="ti ti-x"></i> Decline</button>` : ''}
          ${i.status!=='pending' ? `<button class="btn btn-sm" onclick="setIdeaStatus('${i.id}','pending')"><i class="ti ti-refresh"></i> Reset to pending</button>` : ''}
        </div>
      </div>
    </div>`).join('');
}

window.setIdeaFilter = function (f) { ideaFilter = f; document.getElementById('panel-ideas').innerHTML = ideasMarkup(); };
window.toggleIdea = function (id) { openIdeaId = openIdeaId === id ? null : id; document.getElementById('panel-ideas').innerHTML = ideasMarkup(); };
window.setIdeaStatus = async function (id, status) { await updateDoc(doc(db, 'researchIdeas', id), { status }); };
window.saveIdeaNote = async function (id, val) { await updateDoc(doc(db, 'researchIdeas', id), { screeningNotes: val }); };

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

document.getElementById('loading').classList.add('hidden');
document.getElementById('screen-home').classList.remove('hidden');
renderHome();
</script>
</body>
</html>
