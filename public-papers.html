<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research \u2014 Overview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">

@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');
@font-face { font-family:'Virage'; font-weight:600; font-style:normal; src:url('assets/fonts/Virage-Semibold.otf') format('opentype'); font-display:swap; }
@font-face { font-family:'Virage'; font-weight:700; font-style:normal; src:url('assets/fonts/Virage-Bold.otf') format('opentype'); font-display:swap; }
:root{
  --font-sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Virage','Geist',system-ui,sans-serif;

  --bg:#F6F8FA;--surface:#fff;--surface2:#EAEEF1;
  --border:#E1E6F0;--border2:#a1a1a1;
  --text:#171717;--text2:#4d4d4d;--text3:#888888;
  --radius:0 12px 0 12px;--radius-sm:6px;
  --accent:#141428;--accent-press:#0c0c18;--accent-contrast:#fff;

  --blue-bg:#e2edfd;--blue-tx:#0a5bc4;
  --green-bg:#e8f4ec;--green-tx:#11733d;
  --amber-bg:#fdf0d6;--amber-tx:#92580a;
  --purple-bg:#f6edd4;--purple-tx:#856316;
  --teal-bg:rgba(20,20,40,.06);--teal-tx:#141428;
  --coral-bg:#fbe6e4;--coral-tx:#c0291f;
  --grey-bg:#f0f1f3;--grey-tx:#5a6473;
  --red:#c0291f;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171717;--surface:#212121;--surface2:#2a2a2a;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
  --text:#f2f2f2;--text2:#b4b4b4;--text3:#888888;
  --accent:#7f8fdc;--accent-press:#a3b0e6;--accent-contrast:#141428;
  --blue-bg:#0a5bc4;--blue-tx:#e2edfd;
  --green-bg:#11733d;--green-tx:#e8f4ec;
  --amber-bg:#92580a;--amber-tx:#fdf0d6;
  --purple-bg:#856316;--purple-tx:#f6edd4;
  --teal-bg:rgba(127,143,220,.14);--teal-tx:#c7cef2;
  --coral-bg:#c0291f;--coral-tx:#fbe6e4;
  --grey-bg:#3a3f47;--grey-tx:#c2c8d1;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:2rem 1.25rem}
.logo{font-family:var(--font-display);font-weight:700;font-size:21px;display:flex;align-items:center;gap:9px;color:var(--text)}
.logo img{height:26px;width:auto}
.sub{font-size:14px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;color:var(--text);font-family:var(--font-sans);text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:12px}
.lang-switch{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.top-strip{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-link{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;border:1px solid transparent}
.nav-link:hover{background:var(--surface2)}
.nav-link.current{background:var(--accent);color:#fff}
.hero{position:relative;overflow:hidden;background:#141428;border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem}
.hero .wm{position:absolute;right:-6%;bottom:-30%;width:55%;opacity:.10;filter:invert(1);pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero .logo{color:#fff}
.hero .sub{color:rgba(255,255,255,.78)}
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px}
.alert-err{background:rgba(192,41,31,.1);color:var(--red);border:0.5px solid rgba(192,41,31,.3)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.ext-link-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--teal-bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1.5rem;flex-wrap:wrap}
.ext-link-card .txt{font-size:13px;color:var(--teal-tx)}
.ext-link-card .txt strong{display:block;font-size:15px;margin-bottom:2px}
.ext-link-card .btn{border-color:var(--teal-tx);color:var(--teal-tx);background:var(--surface)}
.ext-link-card .btn:hover{background:var(--teal-bg)}

.idea-form label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;margin-top:1.1rem}
.idea-form label:first-child{margin-top:0}
.idea-form label .req{color:var(--red)}
.idea-form label .hint{font-weight:400;color:var(--text3);display:block;margin-top:2px;font-size:12px}
.idea-form textarea{resize:vertical;min-height:72px}
.idea-form .btn-primary{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent);width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:1.5rem}
.idea-form .btn-primary:hover{background:var(--accent-press);border-color:var(--accent-press)}
.idea-form .btn-primary[disabled]{opacity:.5;cursor:not-allowed}
.success-box{text-align:center;padding:2.5rem 1rem}
.success-box i{font-size:40px;color:var(--green-tx)}

.tip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.tip-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .1s}
.tip-card:hover{transform:translateY(-2px)}
.tip-card img{width:100%;height:120px;object-fit:cover;display:block;background:var(--surface2)}
.tip-card .body{padding:.9rem 1rem}
.tip-card .ttl{font-size:14px;font-weight:600;margin-bottom:3px}
.tip-card .dt{font-size:11px;color:var(--text3)}
.tip-detail{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.tip-detail img{width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:1.25rem}
.tip-detail .ttl{font-family:var(--font-display);font-weight:700;font-size:24px;margin-bottom:.3rem}
.tip-detail .body-text{font-size:14px;line-height:1.7;color:var(--text2);white-space:pre-wrap;margin-top:1rem}
.tip-chart{margin-top:1.5rem}
.tip-chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:8px;font-family:var(--font-mono)}

.section-title{font-size:15px;font-weight:600;margin:1.75rem 0 .9rem;display:flex;align-items:center;gap:8px}

.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.cal-filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);color:var(--text2)}
.tab.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.cal-head{background:var(--surface2);text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);padding:6px 2px}
.cal-cell{background:var(--surface);min-height:74px;padding:4px;font-size:11px}
.cal-empty{background:var(--bg)}
.cal-today .cal-daynum{background:var(--text);color:var(--surface);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.cal-daynum{font-size:11px;color:var(--text2);margin-bottom:3px}
.cal-chip{border-radius:5px;padding:1px 5px;margin-bottom:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-blue{background:var(--blue-bg);color:var(--blue-tx)}
.cal-purple{background:var(--purple-bg);color:var(--purple-tx)}
.cal-gold{background:var(--purple-bg);color:var(--purple-tx)}
.cal-grey{background:var(--grey-bg);color:var(--grey-tx)}
.cal-coral{background:var(--coral-bg);color:var(--coral-tx)}
.cal-amber{background:var(--amber-bg);color:var(--amber-tx)}
.cal-more{font-size:10px;color:var(--text3)}
@media(max-width:600px){.cal-cell{min-height:56px;font-size:10px}.cal-chip{font-size:9px}}

.idea-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:.7rem;padding:1rem 1.25rem}
.idea-title{font-size:14px;font-weight:600}
.idea-meta{font-size:12px;color:var(--text3);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}

.article-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.9rem}
.article-title{font-size:14px;font-weight:600;line-height:1.4}
.article-title a{color:var(--text);text-decoration:none}
.article-title a:hover{text-decoration:underline}
.article-meta{font-size:11px;color:var(--text3);margin-top:4px}
.article-snip{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5}
.article-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:.9rem;flex-wrap:wrap}
.stars{display:flex;gap:2px}
.star{font-size:18px;cursor:pointer;color:var(--border2)}
.star.filled{color:#e8a33d}
.rating-info{font-size:11px;color:var(--text3);margin-left:6px}
.pdf-form{margin-top:.9rem;padding:.9rem;background:var(--surface2);border-radius:var(--radius-sm)}
.pdf-form input,.pdf-form textarea{margin-top:4px;margin-bottom:.6rem}
input,textarea{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none}
</style>
</head>

function pad2(n){ return n < 10 ? '0'+n : ''+n; }

function dayHeaders(){
  const base = new Date(2024,0,1);
  const out = [];
  for (let i=0;i<7;i++){ const d = new Date(base); d.setDate(base.getDate()+i); out.push(d.toLocaleDateString(I18N[lang].locale,{weekday:'short'})); }
  return out;
}
function filteredEvents(){ return calFilter === 'all' ? events : events.filter(function(e){ return e.type === calFilter; }); }

function calendarGridMarkup(){
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const first = new Date(y, m, 1);
  const offset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
  const todayStr = isoDate(new Date());
  const evs = filteredEvents();

  let cells = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - offset + 1;
    if (dayNum < 1 || dayNum > daysInMonth) { cells += '<div class="cal-cell cal-empty"></div>'; continue; }
    const d = new Date(y, m, dayNum);
    const dStr = isoDate(d);
    const dayEvents = evs.filter(function(e){ return e.date === dStr; });
    const isToday = dStr === todayStr;
    cells += '<div class="cal-cell '+(isToday?'cal-today':'')+'">'+
      '<div class="cal-daynum">'+dayNum+'</div>'+
      dayEvents.slice(0,3).map(function(e){
        const c = EVENT_COLORS[e.type] || 'blue';
        return '<div class="cal-chip cal-'+c+'" title="'+esc(e.title)+'">'+esc(e.title)+'</div>';
      }).join('') +
      (dayEvents.length > 3 ? '<div class="cal-more">+'+(dayEvents.length-3)+'</div>' : '') +
      '</div>';
  }

  const headers = dayHeaders().map(function(h){ return '<div class="cal-head">'+h+'</div>'; }).join('');

  return '<div class="cal-nav">'+
    '<button class="btn btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>'+
    '<div style="font-weight:600;font-size:15px">'+monthLabel(calDate)+'</div>'+
    '<button class="btn btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>'+
    '<button class="btn btn-sm" onclick="goToday()">'+t('today')+'</button>'+

    '<div class="cal-filters">'+
    '<div class="tab '+(calFilter==='all'?'active':'')+'" onclick="setCalFilter(\'all\')">'+t('allTypes')+'</div>'+
    EVENT_TYPES.map(function(ty){ return '<div class="tab '+(calFilter===ty?'active':'')+'" onclick="setCalFilter(\''+ty+'\')">'+t(ty)+'</div>'; }).join('')+
    '</div>'+

}

let rssArticles = [], rssLoading = true, rssFailed = false;

function simpleHash(str){
  let h = 0;
  for (let i=0;i<str.length;i++){ h = (h<<5) - h + str.charCodeAt(i); h |= 0; }
  return 'a' + Math.abs(h).toString(36);
}
function normalizeKey(item){ return (item.link || item.guid || item.title || '').split('?')[0].trim().toLowerCase(); }
function articleId(item){ return simpleHash(normalizeKey(item)); }
function stripHtml(s){ const d = document.createElement('div'); d.innerHTML = s || ''; return d.textContent || ''; }

async function loadRssArticles(){
  rssLoading = true; rssFailed = false; renderRss();
  try {
    const results = await Promise.all(RSS_FEEDS.map(function(url){
      return fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url))
        .then(function(r){ return r.json(); })
        .catch(function(){ return null; });
    }));
    let items = [];
    results.forEach(function(res){ if (res && res.status === 'ok' && res.items) items = items.concat(res.items); });
    const seen = {};
    const deduped = [];
    items.forEach(function(item){
      const key = normalizeKey(item);
      if (key && !seen[key]) { seen[key] = true; deduped.push(item); }
    });
    deduped.sort(function(a,b){ return new Date(b.pubDate) - new Date(a.pubDate); });
    rssArticles = deduped.slice(0, 60);
    rssLoading = false;
  } catch (e) {
    rssFailed = true; rssLoading = false;
  }
  renderRss();
  if (window.watchArticleRatings) rssArticles.forEach(function(item){ window.watchArticleRatings(articleId(item)); });
}

function starsMarkup(id, avg, count){
  const rounded = Math.round(avg);

  for (let i=1;i<=5;i++){
    out += '<span class="star '+(i<=rounded?'filled':'')+'" onclick="rateArticle(\''+id+'\','+i+')">\u2605</span>';
  }
  out += '</div><span class="rating-info">'+(count ? avg.toFixed(1)+' ('+count+' '+t('ratings')+')' : '')+'</span>';
  return out;
}

function rateArticle(id, value){
  const item = rssArticles.find(function(a){ return articleId(a) === id; });
  if (!item || !window.submitRating) return;
  const prev = myRatings[id] || 0;
  window.submitRating(id, item, value, prev);
  myRatings[id] = value;
  try { localStorage.setItem('myArticleRatings', JSON.stringify(myRatings)); } catch(e) {}
}

function articleMarkup(item){

  const r = ratingsMap[id] || { sum:0, count:0 };
  const avg = r.count ? r.sum / r.count : 0;
  const dLabel = item.pubDate ? new Date(item.pubDate).toLocaleDateString(I18N[lang].locale, {day:'numeric',month:'short',year:'numeric'}) : '';

    (snippet ? '<div class="article-snip">'+esc(snippet)+(snippet.length>=220?'...':'')+'</div>' : '')+
    '<div class="article-footer">'+
    starsMarkup(id, avg, r.count)+
    (requestSentIds[id] ?
      '<span class="badge b-accepted"><i class="ti ti-check"></i> '+t('requestSent')+'</span>' :
      '<button class="btn btn-sm" onclick="openRequestForm(\''+id+'\')"><i class="ti ti-file-download"></i> '+t('requestPdf')+'</button>')+
    '</div>'+
    (requestFormOpenId === id ? '<div class="pdf-form">'+

      '<button class="btn btn-sm" onclick="closeRequestForm()">'+t('cancel')+'</button></div>'+
      '</div>' : '')+
    '</div>';
}

function setSortMode(mode){ rssSortMode = mode; renderRss(); }
function setDateFilter(f){ rssDateFilter = f; renderRss(); }

function withinDateRange(item){
  if (rssDateFilter === 'all') return true;
  const d = new Date(item.pubDate);
  if (isNaN(d)) return true;
  const diffDays = (new Date() - d) / (1000*60*60*24);
  if (rssDateFilter === 'week') return diffDays <= 7;
  if (rssDateFilter === 'month') return diffDays <= 31;
  if (rssDateFilter === 'year') return diffDays <= 366;
  return true;
}

function sortedArticles(){
  const list = rssArticles.filter(withinDateRange);
  if (rssSortMode === 'rating') {
    list.sort(function(a, b){
      const ra = ratingsMap[articleId(a)] || { sum:0, count:0 };
      const rb = ratingsMap[articleId(b)] || { sum:0, count:0 };
      const avgA = ra.count ? ra.sum / ra.count : 0;
      const avgB = rb.count ? rb.sum / rb.count : 0;
      if (avgB !== avgA) return avgB - avgA;
      return (rb.count || 0) - (ra.count || 0);
    });
  } else {
    list.sort(function(a, b){ return new Date(b.pubDate) - new Date(a.pubDate); });
  }
  return list;
}

function renderRss(){
  const el = document.getElementById('rss-container');
  if (!el) return;
  if (rssFailed) { el.innerHTML = '<div class="alert alert-err">'+t('rssFailed')+'</div>'; return; }
  if (rssLoading) { el.innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('rssLoading')+'</div></div>'; return; }
  const errHtml = ratingErrorMsg ? '<div class="alert alert-err" style="margin-bottom:1rem"><i class="ti ti-alert-circle"></i> '+esc(ratingErrorMsg)+'</div>' : '';
  const dateTabsHtml = '<div class="tabs" style="margin-bottom:8px">'+
    '<div class="tab '+(rssDateFilter==='all'?'active':'')+'" onclick="setDateFilter(\'all\')">'+t('dateAll')+'</div>'+
    '<div class="tab '+(rssDateFilter==='week'?'active':'')+'" onclick="setDateFilter(\'week\')">'+t('dateWeek')+'</div>'+
    '<div class="tab '+(rssDateFilter==='month'?'active':'')+'" onclick="setDateFilter(\'month\')">'+t('dateMonth')+'</div>'+
    '<div class="tab '+(rssDateFilter==='year'?'active':'')+'" onclick="setDateFilter(\'year\')">'+t('dateYear')+'</div>'+
    '</div>';
  const sortTabsHtml = '<div class="tabs" style="margin-bottom:1rem">'+
    '<div class="tab '+(rssSortMode==='date'?'active':'')+'" onclick="setSortMode(\'date\')">'+t('sortNewest')+'</div>'+
    '<div class="tab '+(rssSortMode==='rating'?'active':'')+'" onclick="setSortMode(\'rating\')">'+t('sortTopRated')+'</div>'+
    '</div>';
  const list = sortedArticles();
  if (!list.length) { el.innerHTML = errHtml + dateTabsHtml + sortTabsHtml + '<div class="empty"><i class="ti ti-news-off" style="font-size:24px"></i><div style="margin-top:8px">'+t('rssEmpty')+'</div></div>'; return; }
  el.innerHTML = errHtml + dateTabsHtml + sortTabsHtml + list.map(articleMarkup).join('');
}

let tipPosts = [], tipPostsReady = false, tipPostsFailed = false;

function fmtTipDate(ts){ if (!ts || !ts.toDate) return ''; return ts.toDate().toLocaleDateString(I18N[lang].locale, {day:'numeric',month:'short',year:'numeric'}); }

function chartSvgMarkup(chart){
  const rows = chart.rows || [];
  if (!rows.length) return '';
  const max = Math.max.apply(null, rows.map(function(r){ return Number(r.value) || 0; })) || 1;
  const w = 560, barH = 26, gap = 12, leftPad = 110, rightPad = 50, topPad = 8;
  const h = topPad*2 + rows.length * (barH + gap) - gap;
  let bars = '';
  rows.forEach(function(r, i){
    const val = Number(r.value) || 0;
    const barMaxW = w - leftPad - rightPad;
    const bw = Math.max(2, (val / max) * barMaxW);
    const y = topPad + i * (barH + gap);
    bars += '<text x="'+(leftPad-8)+'" y="'+(y+barH/2)+'" text-anchor="end" dominant-baseline="central" font-size="11" font-family="var(--font-sans)" fill="var(--text2)">'+esc(r.label)+'</text>';
    bars += '<rect x="'+leftPad+'" y="'+y+'" width="'+bw+'" height="'+barH+'" fill="#315FCA" rx="2"></rect>';
    bars += '<text x="'+(leftPad+bw+8)+'" y="'+(y+barH/2)+'" dominant-baseline="central" font-size="11" font-family="var(--font-mono)" fill="var(--text)">'+esc(r.value)+'</text>';
  });
  return '<div class="tip-chart">'+
    (chart.title ? '<div class="tip-chart-title">'+esc(chart.title)+'</div>' : '')+
    '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:560px;display:block">'+bars+'</svg>'+
    '</div>';
}

function tipCardMarkup(p){
  return '<div class="tip-card" onclick="openTipPost(\''+p.id+'\')">'+
    (p.coverImage ? '<img src="'+esc(p.coverImage)+'" alt="" onerror="this.style.display=\'none\'">' : '')+
    '<div class="body"><div class="ttl">'+esc(p.title)+'</div><div class="dt">'+t('tipPublished')+' '+fmtTipDate(p.createdAt)+'</div></div>'+
    '</div>';
}

function tipDetailMarkup(p){
  return '<div class="tip-detail">'+
    '<button class="btn btn-sm" onclick="closeTipPost()" style="margin-bottom:1.25rem"><i class="ti ti-arrow-left"></i> '+t('tipBack')+'</button>'+
    (p.coverImage ? '<img src="'+esc(p.coverImage)+'" alt="" onerror="this.style.display=\'none\'">' : '')+
    '<div class="ttl">'+esc(p.title)+'</div>'+
    '<div class="dt" style="font-size:12px;color:var(--text3)">'+t('tipPublished')+' '+fmtTipDate(p.createdAt)+'</div>'+
    '<div class="body-text">'+esc(p.body)+'</div>'+
    (p.charts || []).map(chartSvgMarkup).join('')+
    '</div>';
}

function renderTip(){
  const el = document.getElementById('tip-container');
  if (!el) return;
  if (tipPostsFailed) { el.innerHTML = '<div class="alert alert-err">'+t('offline')+'</div>'; return; }
  if (!tipPostsReady) { el.innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner"></div><div class="sub" style="margin-top:10px">'+t('connecting')+'</div></div>'; return; }
  if (tipOpenId) {
    const p = tipPosts.find(function(x){ return x.id === tipOpenId; });
    if (p) { el.innerHTML = tipDetailMarkup(p); return; }
  }
  if (!tipPosts.length) { el.innerHTML = '<div class="empty"><i class="ti ti-notes" style="font-size:24px"></i><div style="margin-top:8px">'+t('tipNoPosts')+'</div></div>'; return; }
  el.innerHTML = '<div class="tip-grid">' + tipPosts.map(tipCardMarkup).join('') + '</div>';
}

function openTipPost(id){ tipOpenId = id; renderTip(); window.scrollTo({top: document.getElementById('tip-container').offsetTop - 20, behavior:'smooth'}); }
function closeTipPost(){ tipOpenId = null; renderTip(); }

function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['en','fr','it','es'].map(function(l){
    return '<button class="lang-btn '+(l===lang?'active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>';
  }).join('');
}
function applyStaticText(){ document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.dataset.t); }); }
function setLang(l){ lang = l; try { localStorage.setItem('hubLang', l); } catch(e) {} renderLangSwitch(); renderNav(); applyStaticText(); renderCalendar(); renderIdeaForm(); renderRss(); renderTip(); }

window.changeMonth = changeMonth;
window.goToday = goToday;
window.setCalFilter = setCalFilter;
window.setLang = setLang;
window.onEventsUpdated = function(data){ events = data; eventsReady = true; renderCalendar(); };
window.onEventsFailed = function(){ eventsFailed = true; renderCalendar(); };
window.rateArticle = rateArticle;
window.setSortMode = setSortMode;
window.openRequestForm = openRequestForm;
window.closeRequestForm = closeRequestForm;
window.updateRequestDraft = updateRequestDraft;
window.confirmSendRequest = confirmSendRequest;
window.onArticleRatingUpdated = function(id, sum, count){ ratingsMap[id] = { sum: sum, count: count }; renderRss(); };
window.onRatingLoadFailed = function(){ if (!ratingErrorMsg) { ratingErrorMsg = I18N[lang].ratingLoadErr; renderRss(); } };
window.onRatingSaveFailed = function(){ ratingErrorMsg = I18N[lang].ratingSaveErr; renderRss(); };
window.updateIdeaDraft = updateIdeaDraft;
window.confirmSubmitIdea = confirmSubmitIdea;
window.resetIdeaForm = resetIdeaForm;
window.onIdeaSubmitted = function(){ ideaSubmitting = false; ideaSubmitted = true; renderIdeaForm(); };
window.onIdeaSubmitFailed = function(){ ideaSubmitting = false; ideaErrorMsg = I18N[lang].idea.errMsg; renderIdeaForm(); };
window.openTipPost = openTipPost;
window.closeTipPost = closeTipPost;
window.onTipPostsUpdated = function(data){ tipPosts = data; tipPostsReady = true; renderTip(); };
window.onTipPostsFailed = function(){ tipPostsFailed = true; renderTip(); };

renderLangSwitch();
renderNav();
applyStaticText();
renderIdeaForm();
renderCalendar();
renderTip();
loadRssArticles();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, addDoc, runTransaction, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdKgOZILgA_r6axtQKWWLqVaDBUkp6OKE",
  authDomain: "phd-tracker-22d93.firebaseapp.com",
  projectId: "phd-tracker-22d93",
  storageBucket: "phd-tracker-22d93.firebasestorage.app",
  messagingSenderId: "252875836800",
  appId: "1:252875836800:web:dc6575ffab316da3744565"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  if (window.onEventsFailed) window.onEventsFailed();
}

if (db) {
  const q = query(collection(db, 'researchEvents'), orderBy('date', 'asc'));
  onSnapshot(q,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onEventsUpdated) window.onEventsUpdated(data);
    },
    function () {
      if (window.onEventsFailed) window.onEventsFailed();
    }
  );
  const tipQ = query(collection(db, 'tipPosts'), orderBy('createdAt', 'desc'));
  onSnapshot(tipQ,
    function (snap) {
      const data = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
      if (window.onTipPostsUpdated) window.onTipPostsUpdated(data);
    },
    function () {
      if (window.onTipPostsFailed) window.onTipPostsFailed();
    }
  );
} else {
  if (window.onEventsFailed) window.onEventsFailed();
  if (window.onTipPostsFailed) window.onTipPostsFailed();
}

const watchedRatings = {};
window.watchArticleRatings = function (id) {
  if (!db || watchedRatings[id]) return;
  watchedRatings[id] = true;
  onSnapshot(doc(db, 'articleRatings', id), function (snap) {
    const data = snap.exists() ? snap.data() : { sum: 0, count: 0 };
    if (window.onArticleRatingUpdated) window.onArticleRatingUpdated(id, data.sum || 0, data.count || 0);
  }, function (err) {
    console.error('Rating read failed for', id, err);
    if (window.onRatingLoadFailed) window.onRatingLoadFailed();
  });
};

window.submitRating = async function (id, item, value, previousValue) {
  if (!db) { if (window.onRatingSaveFailed) window.onRatingSaveFailed(); return; }
  const ref = doc(db, 'articleRatings', id);
  try {
    await runTransaction(db, async function (tx) {
      const snap = await tx.get(ref);
      if (!snap.exists()) {
        tx.set(ref, { title: item.title || '', link: item.link || '', sum: value, count: 1 });
      } else {
        const data = snap.data();
        const hadPrevious = previousValue > 0;
        const newSum = (data.sum || 0) - (hadPrevious ? previousValue : 0) + value;
        const newCount = (data.count || 0) + (hadPrevious ? 0 : 1);
        tx.update(ref, { sum: newSum, count: newCount, title: item.title || '', link: item.link || '' });
      }
    });
  } catch (e) {
    console.error('Rating write failed', e);
    if (window.onRatingSaveFailed) window.onRatingSaveFailed();
  }
};

// TODO: configure EmailJS (same account as submit-idea.html) to notify the owner
// when a PDF request comes in. Create a 3rd template with variables:
// requester_email, article_title, article_link, notes
const EMAILJS_PUBLIC_KEY = "YOUR_EMAILJS_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "YOUR_EMAILJS_SERVICE_ID";
const EMAILJS_TEMPLATE_ID_PDF = "YOUR_EMAILJS_TEMPLATE_ID_PDF_REQUEST";
if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') window.emailjs.init(EMAILJS_PUBLIC_KEY);

// TODO: configure EmailJS (same account/public key as the other templates) to notify
// the owner when a new idea is submitted. Create a 4th template with variables:
// submitter_name, submitter_email, idea_title, objective
const EMAILJS_TEMPLATE_ID_NEW_IDEA = "YOUR_EMAILJS_TEMPLATE_ID_NEW_IDEA";

window.submitResearchIdea = async function (draft) {
  if (!db) { if (window.onIdeaSubmitFailed) window.onIdeaSubmitFailed(); return; }
  try {
    await addDoc(collection(db, 'researchIdeas'), {
      submitterName: draft.name,
      submitterEmail: draft.email,
      title: draft.title,
      objective: draft.objective,
      sample: draft.sample,
      methods: draft.methods,
      links: draft.links || '',
      notes: draft.notes || '',
      status: 'pending',
      screeningNotes: '',
      createdAt: serverTimestamp()
    });
    if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') {
      window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID_NEW_IDEA, {
        submitter_name: draft.name,
        submitter_email: draft.email,
        idea_title: draft.title,
        objective: draft.objective
      }).catch(function () {});
    }
    if (window.onIdeaSubmitted) window.onIdeaSubmitted();
  } catch (e) {
    if (window.onIdeaSubmitFailed) window.onIdeaSubmitFailed();
  }
};

window.submitPdfRequest = async function (item, email, notes) {
  if (!db) return;
  await addDoc(collection(db, 'paperRequests'), {
    articleTitle: item.title || '',
    articleLink: item.link || '',
    requesterEmail: email,
    notes: notes || '',
    status: 'pending',
    createdAt: serverTimestamp()
  });
  if (window.emailjs && EMAILJS_PUBLIC_KEY !== 'YOUR_EMAILJS_PUBLIC_KEY') {
    window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID_PDF, {
      requester_email: email,
      article_title: item.title || '',
      article_link: item.link || '',
      notes: notes || ''
    }).catch(function () {});
  }
};
</script>
